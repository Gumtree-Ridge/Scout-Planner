// Sections that count toward completeness (skip review)
const COMPLETABLE_SECTIONS = WIZARD_SECTIONS.filter(s => s.id !== 'review').map(s => s.id);

function sectionHasContent(plan, sectionId){
  const sec = (plan.sections && plan.sections[sectionId]) || {};
  if(sectionId === 'safety'){ return Array.isArray(sec.hazards) && sec.hazards.length > 0; }
  if(sectionId === 'equipment'){ return Array.isArray(sec.selectedItems) && sec.selectedItems.length > 0; }
  return Object.keys(sec).some(k => { const v = sec[k]; return v !== undefined && v !== '' && !(Array.isArray(v) && v.length===0); });
}

function computePercent(plan){
  const done = COMPLETABLE_SECTIONS.filter(id => sectionHasContent(plan, id));
  return { completed: done, percent: Math.round((done.length / COMPLETABLE_SECTIONS.length) * 100) };
}

function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function riskColor(level){
  const l = (level||'').toUpperCase();
  if(l === 'LOW') return { bg:'#16a34a', text:'#fff', soft:'#dcfce7' };
  if(l === 'MEDIUM' || l === 'MODERATE') return { bg:'#F5A800', text:'#000', soft:'#fef3c7' };
  if(l === 'HIGH') return { bg:'#dc2626', text:'#fff', soft:'#fee2e2' };
  return { bg:'#9ca3af', text:'#fff', soft:'#f3f4f6' };
}

/* ============================================================
   6. TIMELINE STRIP (SVG)
   ============================================================ */
function TimelineStrip({ activityDate }){
  if(!activityDate) return null;
  const target = new Date(activityDate);
  const wk = 7*24*3600*1000;
  const milestones = [
    { label:"Concept", weeks:-8 },
    { label:"Plan submitted", weeks:-6 },
    { label:"Leader review", weeks:-5 },
    { label:"Final approval", weeks:-3 },
    { label:"Pre-activity brief", weeks:-1 },
    { label:"Activity day", weeks:0 }
  ].map(m => ({ ...m, date: new Date(target.getTime() + m.weeks*wk) }));

  let firstFutureIndex = milestones.findIndex(m => m.date.getTime() > TODAY.getTime());
  const states = milestones.map((m) => {
    const diffDays = Math.round((m.date.getTime() - TODAY.getTime()) / (24*3600*1000));
    if(Math.abs(diffDays) <= 3) return 'current';
    if(m.date.getTime() < TODAY.getTime()) return 'done';
    return 'upcoming';
  });
  const colorMap = { done:'#16a34a', current: GOLD, upcoming:'#9ca3af', overdue:'#dc2626' };
  const anyCurrent = states.includes('current');
  if(!anyCurrent && firstFutureIndex > 0){
    const idx = firstFutureIndex - 1;
    const diffDays = Math.round((milestones[idx].date.getTime() - TODAY.getTime()) / (24*3600*1000));
    if(diffDays < -3) states[idx] = 'overdue';
  }

  const W = 760, H = 130, padX = 60, y = 55;
  const step = (W - 2*padX) / (milestones.length - 1);

  return (
    <div className="bg-white rounded-xl shadow p-4 mb-6">
      <div className="font-bold mb-1" style={{ color: PURPLE }}>📅 Your Planning Timeline</div>
      <div className="text-xs text-gray-500 mb-2">Next activity: {formatDate(activityDate)}</div>
      <div className="overflow-x-auto scrollx">
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ minWidth: 700 }}>
          {milestones.map((m, i) => {
            if(i === 0) return null;
            const x1 = padX + (i-1)*step, x2 = padX + i*step;
            const lineDone = states[i-1] === 'done' || states[i-1] === 'current';
            return <line key={'l'+i} x1={x1} y1={y} x2={x2} y2={y}
              stroke={lineDone ? '#16a34a' : '#d1d5db'} strokeWidth="4" />;
          })}
          {milestones.map((m, i) => {
            const x = padX + i*step;
            const st = states[i];
            return (
              <g key={i}>
                {st === 'current' && <text x={x} y={y-22} textAnchor="middle" fontSize="18">🧍</text>}
                <circle cx={x} cy={y} r="11" fill={colorMap[st]} stroke="#fff" strokeWidth="2" />
                <text x={x} y={y+30} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#374151">{m.label}</text>
                <text x={x} y={y+46} textAnchor="middle" fontSize="10" fill="#6b7280">
                  {m.date.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

   ============================================================ */
function libraryForType(type){
  return LIBRARY_DATA.activities.filter(a => a.type === type);
}

/* ============================================================
   10. RISK SCENE SECTION (Section 6)
   ============================================================ */
function RiskSceneSection({ activityType, sectionData, onChange }){
  const zones = ZONES[activityType] || ZONES.hike;
  const [activeZone, setActiveZone] = useState(zones[0].label);
  const [showCustom, setShowCustom] = useState(false);
  const [custom, setCustom] = useState({ hazard:'', initial:'MEDIUM', controls:'', residual:'LOW' });

  const hazardState = sectionData.hazardState || {};

  const libActs = libraryForType(activityType);
  const candidatesByZone = useMemo(() => {
    const map = {};
    zones.forEach(z => { map[z.label] = []; });
    libActs.forEach(act => {
      (act.hazards||[]).forEach(h => {
        const hl = h.hazard.toLowerCase();
        zones.forEach(z => {
          const kws = ZONE_KEYWORDS[z.label] || [];
          if(kws.some(kw => hl.includes(kw))){
            if(!map[z.label].some(e => e.hazard === h.hazard)){
              map[z.label].push({ ...h, sourceTitle: act.title });
            }
          }
        });
      });
    });
    return map;
  }, [activityType]);

  function update(newHazardState){
    const hazards = Object.values(newHazardState)
      .filter(h => h.status === 'yes' || h.status === 'maybe')
      .map(h => ({ hazard:h.hazard, zone:h.zone, status:h.status, initial_risk:h.initial_risk, controls:h.controls, residual_risk:h.residual_risk }));
    onChange({ hazardState: newHazardState, hazards });
  }

  function setStatus(key, lib, zone, status){
    const next = { ...hazardState };
    const existing = next[key] || {};
    next[key] = {
      hazard: lib.hazard, zone,
      status,
      initial_risk: existing.initial_risk || lib.initial_risk || 'MEDIUM',
      controls: existing.controls !== undefined ? existing.controls : (lib.controls || []).join('\n'),
      residual_risk: existing.residual_risk || lib.residual_risk || 'LOW',
      libInitial: lib.initial_risk
    };
    update(next);
  }
  function setField(key, field, value){
    const next = { ...hazardState };
    next[key] = { ...next[key], [field]: value };
    update(next);
  }

  function addCustom(){
    if(!custom.hazard.trim()) return;
    const key = 'custom:' + custom.hazard;
    const next = { ...hazardState };
    next[key] = { hazard: custom.hazard, zone: activeZone, status:'yes',
      initial_risk: custom.initial, controls: custom.controls, residual_risk: custom.residual, custom:true };
    update(next);
    setCustom({ hazard:'', initial:'MEDIUM', controls:'', residual:'LOW' });
    setShowCustom(false);
  }

  const reviewedZones = new Set(Object.values(hazardState).filter(h=>h.status==='yes'||h.status==='maybe').map(h=>h.zone));

  const candidates = candidatesByZone[activeZone] || [];
  const customInZone = Object.entries(hazardState).filter(([k,h]) => h.custom && h.zone === activeZone);

  function RiskSelect({ value, onChange }){
    const c = riskColor(value);
    return (
      <select value={value} onChange={e=>onChange(e.target.value)}
        className="rounded px-2 py-1 text-sm font-bold border"
        style={{ backgroundColor: c.soft, color:'#000' }}>
        {['LOW','MEDIUM','HIGH'].map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }

  return (
    <div>
      <div className="overflow-x-auto scrollx -mx-1 mb-4">
        <div className="flex gap-2 px-1 pb-1">
          {zones.map(z => {
            const active = z.label === activeZone;
            const reviewed = reviewedZones.has(z.label);
            return (
              <button key={z.label} onClick={() => setActiveZone(z.label)}
                className="flex-shrink-0 rounded-xl px-3 py-2 text-center border-2 min-w-[90px]"
                style={{ borderColor: active ? BLUE : (reviewed ? '#16a34a' : '#e5e7eb'),
                  backgroundColor: active ? '#e0f2fe' : '#fff' }}>
                <div className="text-2xl">{z.emoji}</div>
                <div className="text-xs font-bold" style={{ color: PURPLE }}>{z.label}</div>
                {reviewed && <div className="text-[10px] text-green-600">✓ reviewed</div>}
              </button>
            );
          })}
        </div>
      </div>

      <div className="text-sm font-bold mb-3" style={{ color: PURPLE }}>
        {reviewedZones.size} of {zones.length} zones reviewed
      </div>

      <div className="text-sm text-gray-600 mb-3">
        Hazards that might happen at <b>{activeZone}</b>. Tell us which ones matter for your activity.
      </div>

      <div className="space-y-3">
        {candidates.length === 0 && customInZone.length === 0 && (
          <div className="text-sm text-gray-400 italic">No suggested hazards for this zone — add your own below!</div>
        )}
        {candidates.map((lib, i) => {
          const key = activeZone + '|' + lib.hazard;
          const h = hazardState[key] || {};
          return (
            <div key={i} className="bg-white rounded-xl shadow p-4">
              <div className="font-bold mb-2" style={{ color: PURPLE }}>{lib.hazard}</div>
              <div className="text-sm text-gray-600 mb-2">Is this relevant to your activity?</div>
              <div className="flex gap-2 mb-2">
                {[['yes','✅ Yes','#16a34a'],['maybe','❓ Maybe', GOLD],['no','❌ No','#dc2626']].map(([val,lbl,col]) => (
                  <button key={val} onClick={() => setStatus(key, lib, activeZone, val)}
                    className="px-3 py-1 rounded-full text-sm font-bold border-2"
                    style={{ borderColor: col, backgroundColor: h.status===val?col:'#fff', color: h.status===val?'#fff':'#000' }}>
                    {lbl}
                  </button>
                ))}
              </div>
              {(h.status === 'yes' || h.status === 'maybe') && (
                <div className="space-y-2 mt-3 border-t pt-3">
                  <div className="flex items-center gap-2 text-sm">
                    <span className="font-bold w-24">Initial Risk</span>
                    <RiskSelect value={h.initial_risk} onChange={v=>setField(key,'initial_risk',v)} />
                  </div>
                  <div>
                    <div className="text-sm font-bold">Controls (how you'll stay safe)</div>
                    <textarea value={h.controls} onChange={e=>setField(key,'controls',e.target.value)}
                      rows={4} className="w-full border rounded p-2 text-sm mt-1" />
                  </div>
                  <div className="flex items-center gap-2 text-sm">
                    <span className="font-bold w-24">Residual Risk</span>
                    <RiskSelect value={h.residual_risk} onChange={v=>setField(key,'residual_risk',v)} />
                  </div>
                  <div className="text-xs italic" style={{ color: BLUE }}>
                    💡 On a similar {activityType}, this was rated {lib.initial_risk}
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {customInZone.map(([key, h]) => (
          <div key={key} className="bg-white rounded-xl shadow p-4 border-l-4" style={{ borderColor: BLUE }}>
            <div className="font-bold mb-2" style={{ color: PURPLE }}>⭐ {h.hazard} <span className="text-xs text-gray-400">(your hazard)</span></div>
            <div className="space-y-2">
              <div className="flex items-center gap-2 text-sm">
                <span className="font-bold w-24">Initial Risk</span>
                <RiskSelect value={h.initial_risk} onChange={v=>setField(key,'initial_risk',v)} />
              </div>
              <textarea value={h.controls} onChange={e=>setField(key,'controls',e.target.value)}
                rows={3} className="w-full border rounded p-2 text-sm" placeholder="Controls" />
              <div className="flex items-center gap-2 text-sm">
                <span className="font-bold w-24">Residual Risk</span>
                <RiskSelect value={h.residual_risk} onChange={v=>setField(key,'residual_risk',v)} />
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="mt-4">
        {!showCustom ? (
          <button onClick={() => setShowCustom(true)}
            className="px-4 py-2 rounded-full border-2 text-sm font-bold"
            style={{ borderColor: BLUE, color: BLUE }}>➕ Add your own hazard</button>
        ) : (
          <div className="bg-white rounded-xl shadow p-4 space-y-2">
            <input value={custom.hazard} onChange={e=>setCustom({...custom, hazard:e.target.value})}
              placeholder="Describe the hazard" className="w-full border rounded p-2 text-sm" />
            <div className="flex gap-2 items-center text-sm">
              <span className="font-bold">Initial</span>
              <select value={custom.initial} onChange={e=>setCustom({...custom, initial:e.target.value})} className="border rounded p-1">
                {['LOW','MEDIUM','HIGH'].map(o=><option key={o}>{o}</option>)}
              </select>
              <span className="font-bold">Residual</span>
              <select value={custom.residual} onChange={e=>setCustom({...custom, residual:e.target.value})} className="border rounded p-1">
                {['LOW','MEDIUM','HIGH'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <textarea value={custom.controls} onChange={e=>setCustom({...custom, controls:e.target.value})}
              rows={3} placeholder="How will you control it?" className="w-full border rounded p-2 text-sm" />
            <div className="flex gap-2">
              <button onClick={addCustom} className="px-4 py-1 rounded-full font-bold" style={{ backgroundColor: GOLD, color:'#000' }}>Add</button>
              <button onClick={() => setShowCustom(false)} className="px-4 py-1 rounded-full border text-sm">Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   11. EQUIPMENT ROOM SECTION (Section 8)
   ============================================================ */
function EquipmentRoomSection({ activityType, sectionData, onChange, plan }){
  const baseList = LIBRARY_DATA.packing_lists[activityType] || [];
  const stored = sectionData.selectedItems;

  const initItems = useMemo(() => {
    if(stored && stored.length){
      const byName = {};
      stored.forEach(s => { byName[s.item] = s; });
      const merged = baseList.map(b => ({ ...b, selected: byName[b.item] ? byName[b.item].selected : (b.category==='essential') }));
      const customs = stored.filter(s => !baseList.some(b => b.item === s.item)).map(c => ({ ...c, emoji: c.emoji || '📦', selected:true }));
      return [...merged, ...customs];
    }
    return baseList.map(b => ({ ...b, selected: b.category === 'essential' }));
  }, [activityType]); // eslint-disable-line

  const [list, setList] = useState(initItems);
  const [showAdd, setShowAdd] = useState(false);
  const [newItem, setNewItem] = useState({ item:'', category:'essential', weight:0.2, emoji:'📦' });

  useEffect(() => {
    onChange({ selectedItems: list.filter(i => i.selected).map(i => ({ item:i.item, category:i.category, weight:i.weight, emoji:i.emoji, selected:true })) });
  }, [list]);

  const weight = list.filter(i => i.selected).reduce((s,i)=>s+(i.weight||0),0);
  const weightColor = weight > 10 ? '#dc2626' : (weight > 8 ? GOLD : '#16a34a');

  function toggle(idx){
    setList(list.map((it,i) => i===idx ? { ...it, selected: !it.selected } : it));
  }
  function addItem(){
    if(!newItem.item.trim()) return;
    setList([...list, { ...newItem, weight: parseFloat(newItem.weight)||0, selected:true }]);
    setNewItem({ item:'', category:'essential', weight:0.2, emoji:'📦' });
    setShowAdd(false);
  }

  const catBadge = { essential:'🔴 Essential', recommended:'🟡 Recommended', optional:'🟢 Optional' };
  const catColor = { essential:'#dc2626', recommended: GOLD, optional:'#16a34a' };

  const libAct = libraryForType(activityType)[0];
  const season = (plan.sections.activityInfo && plan.sections.activityInfo.s1_season) || (libAct && libAct.weather && libAct.weather.season) || 'the season';
  const loc = (plan.sections.location && plan.sections.location.l1_name) || (libAct && libAct.location && libAct.location.name) || 'your location';

  return (
    <div>
      <div className="rounded-xl p-3 mb-3 text-white text-sm" style={{ backgroundColor: BLUE }}>
        🌤️ Heads up: it'll be <b>{season}</b> around <b>{loc}</b>. Make sure you've packed weather-appropriate gear!
      </div>
      <div className="rounded-xl p-3 mb-4 text-center font-bold text-white" style={{ backgroundColor: weightColor }}>
        🎒 Estimated pack weight: {weight.toFixed(2)} kg
        {weight > 10 && <div className="text-xs font-normal">That's over 10kg — try to cut some weight!</div>}
        {weight > 8 && weight <= 10 && <div className="text-xs font-normal">Getting heavy — keep an eye on it.</div>}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        {list.map((it, idx) => (
          <button key={idx} onClick={() => toggle(idx)}
            className="relative bg-white rounded-xl p-3 text-center border-4 transition"
            style={{ borderColor: it.selected ? catColor[it.category] : '#e5e7eb', opacity: it.selected ? 1 : 0.7 }}>
            {!it.selected && it.category === 'essential' && (
              <div className="absolute top-1 right-1 text-lg" title="Essential not packed!">⚠️</div>
            )}
            <div className="text-3xl mb-1">{it.emoji || '📦'}</div>
            <div className="text-xs font-bold leading-tight">{it.item}</div>
            <div className="text-[10px] mt-1 font-bold" style={{ color: catColor[it.category] }}>{catBadge[it.category]}</div>
          </button>
        ))}
      </div>

      <div className="mt-4">
        {!showAdd ? (
          <button onClick={() => setShowAdd(true)} className="px-4 py-2 rounded-full border-2 text-sm font-bold" style={{ borderColor: BLUE, color: BLUE }}>➕ Add your own item</button>
        ) : (
          <div className="bg-white rounded-xl shadow p-4 space-y-2">
            <input value={newItem.item} onChange={e=>setNewItem({...newItem, item:e.target.value})} placeholder="Item name" className="w-full border rounded p-2 text-sm" />
            <div className="flex gap-2 items-center text-sm flex-wrap">
              <select value={newItem.category} onChange={e=>setNewItem({...newItem, category:e.target.value})} className="border rounded p-1">
                <option value="essential">Essential</option><option value="recommended">Recommended</option><option value="optional">Optional</option>
              </select>
              <label>Weight (kg)</label>
              <input type="number" step="0.1" value={newItem.weight} onChange={e=>setNewItem({...newItem, weight:e.target.value})} className="border rounded p-1 w-20" />
              <input value={newItem.emoji} onChange={e=>setNewItem({...newItem, emoji:e.target.value})} className="border rounded p-1 w-12 text-center" />
            </div>
            <div className="flex gap-2">
              <button onClick={addItem} className="px-4 py-1 rounded-full font-bold" style={{ backgroundColor: GOLD, color:'#000' }}>Add</button>
              <button onClick={() => setShowAdd(false)} className="px-4 py-1 rounded-full border text-sm">Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   13. WIZARD QUESTION (single question renderer)
   ============================================================ */
function WizardQuestion({ field, value, onChange, plan }){
  if(field.type === 'display'){
    const at = ACTIVITY_TYPES.find(a => a.type === plan.activityType);
    return (
      <div className="mb-4">
        <label className="block font-bold mb-1" style={{ color: PURPLE }}>{field.label}</label>
        <div className="inline-flex items-center gap-2 px-3 py-2 rounded-lg" style={{ backgroundColor:'#e0f2fe' }}>
          <span className="text-xl">{at?at.emoji:''}</span><span className="font-bold">{at?at.label:plan.activityType}</span>
        </div>
      </div>
    );
  }

  const inputClass = "w-full border rounded-lg p-2 focus:outline-none focus:ring-2";

  function Field(){
    switch(field.type){
      case 'text':
        return <input type="text" value={value||''} placeholder={field.placeholder||''}
          onChange={e=>onChange(e.target.value)} className={inputClass} />;
      case 'number':
        return <input type="number" value={value||''} placeholder={field.placeholder||''}
          onChange={e=>onChange(e.target.value)} className={inputClass} />;
      case 'date':
        return <input type="date" value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass} />;
      case 'time':
        return <input type="time" value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass} />;
      case 'textarea':
        return <textarea rows={4} value={value||''} placeholder={field.placeholder||''}
          onChange={e=>onChange(e.target.value)} className={inputClass} />;
      case 'select':
        return (
          <select value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass}>
            <option value="">— Choose —</option>
            {field.options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        );
      case 'yesno':
        return (
          <div className="flex gap-3">
            {['Yes','No'].map(o => (
              <button key={o} onClick={()=>onChange(o)} type="button"
                className="px-6 py-2 rounded-full font-bold border-2"
                style={{ borderColor: value===o?BLUE:'#e5e7eb', backgroundColor: value===o?BLUE:'#fff', color: value===o?'#fff':'#000' }}>
                {o==='Yes'?'✅ Yes':'❌ No'}
              </button>
            ))}
          </div>
        );
      case 'yesno+textarea': {
        const v = value || {};
        return (
          <div>
            <div className="flex gap-3 mb-2">
              {['Yes','No'].map(o => (
                <button key={o} onClick={()=>onChange({...v, answer:o})} type="button"
                  className="px-6 py-2 rounded-full font-bold border-2"
                  style={{ borderColor: v.answer===o?BLUE:'#e5e7eb', backgroundColor: v.answer===o?BLUE:'#fff', color: v.answer===o?'#fff':'#000' }}>
                  {o==='Yes'?'✅ Yes':'❌ No'}
                </button>
              ))}
            </div>
            {v.answer === 'Yes' && (
              <textarea rows={3} value={v.details||''} placeholder="Which permits or bookings? Add details here."
                onChange={e=>onChange({...v, details:e.target.value})} className={inputClass} />
            )}
          </div>
        );
      }
      case 'checkboxes': {
        const arr = Array.isArray(value) ? value : [];
        return (
          <div className="flex flex-wrap gap-2">
            {field.options.map(o => {
              const on = arr.includes(o);
              return (
                <button key={o} type="button"
                  onClick={()=>onChange(on ? arr.filter(x=>x!==o) : [...arr, o])}
                  className="px-3 py-2 rounded-full text-sm border-2 font-bold"
                  style={{ borderColor: on?BLUE:'#e5e7eb', backgroundColor: on?'#e0f2fe':'#fff' }}>
                  {on?'☑️ ':'⬜ '}{o}
                </button>
              );
            })}
          </div>
        );
      }
      default:
        return null;
    }
  }

  return (
    <div className="mb-5">
      <label className="block font-bold mb-2" style={{ color: PURPLE }}>
        {field.label} {field.required && <span style={{ color:'#dc2626' }}>*</span>}
      </label>
      <Field />
      {field.hint && (
        <div className="mt-2 text-sm rounded-lg p-2 flex gap-2" style={{ backgroundColor:'#fef3c7' }}>
          <span>💡</span><span>{field.hint}</span>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   14. WIZARD
   ============================================================ */
function completedDot(plan, section){
  if(section.id === 'review') return false;
  return sectionHasContent(plan, section.id);
}

function Wizard({ plan, setPlan, onExit, onExport }){
  const [stepIdx, setStepIdx] = useState(0);
  const section = WIZARD_SECTIONS[stepIdx];

  function finalisePlan(p){
    const { completed, percent } = computePercent(p);
    const ai = p.sections.activityInfo || {};
    return { ...p, title: ai.s1_name || p.title, activityDate: ai.s1_dates || p.activityDate,
      completedSections: completed, percentComplete: percent, updatedAt: new Date().toISOString() };
  }

  function updateField(sectionId, fieldId, value){
    setPlan(prev => finalisePlan({ ...prev, sections: { ...prev.sections, [sectionId]: { ...prev.sections[sectionId], [fieldId]: value } } }));
  }
  function updateSceneSection(sectionId, data){
    setPlan(prev => finalisePlan({ ...prev, sections: { ...prev.sections, [sectionId]: { ...prev.sections[sectionId], ...data } } }));
  }

  const isLast = stepIdx === WIZARD_SECTIONS.length - 1;
  function next(){ if(!isLast) setStepIdx(stepIdx+1); }
  function prev(){ if(stepIdx>0) setStepIdx(stepIdx-1); else onExit(); }

  return (
    <div className="max-w-3xl mx-auto px-4 py-6 pb-24">
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <button onClick={onExit} className="text-sm" style={{ color: PURPLE }}>💾 Save &amp; exit</button>
          <span className="text-sm text-gray-500">Section {section.number} of {WIZARD_SECTIONS.length}</span>
        </div>
        <div className="w-full bg-gray-200 rounded-full h-2">
          <div className="h-2 rounded-full" style={{ width: ((stepIdx+1)/WIZARD_SECTIONS.length*100)+'%', backgroundColor: BLUE }}></div>
        </div>
        <div className="overflow-x-auto scrollx mt-2">
          <div className="flex gap-1">
            {WIZARD_SECTIONS.map((s,i) => (
              <button key={s.id} onClick={()=>setStepIdx(i)} title={s.label}
                className="flex-shrink-0 w-7 h-7 rounded-full text-xs font-bold border-2"
                style={{ borderColor: i===stepIdx?BLUE:'#e5e7eb',
                  backgroundColor: completedDot(plan,s)?'#16a34a': (i===stepIdx?BLUE:'#fff'),
                  color: (completedDot(plan,s)||i===stepIdx)?'#fff':'#9ca3af' }}>
                {s.number}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="rounded-xl p-4 mb-4 text-white" style={{ background: HEADER_GRAD }}>
        <div className="text-xs opacity-80">Section {section.number}</div>
        <h2 className="text-xl font-bold">{section.label}</h2>
        <p className="text-sm opacity-90 mt-1">{section.intro}</p>
      </div>

      <div>
        {section.fields.map(f => {
          if(f.type === 'scene'){
            return <RiskSceneSection key={f.id} activityType={plan.activityType}
              sectionData={plan.sections.safety || {}}
              onChange={data => updateSceneSection('safety', data)} />;
          }
          if(f.type === 'equipment_scene'){
            return <EquipmentRoomSection key={f.id} activityType={plan.activityType}
              sectionData={plan.sections.equipment || {}} plan={plan}
              onChange={data => updateSceneSection('equipment', data)} />;
          }
          if(f.type === 'review_summary'){
            return <ReviewSummarySection key={f.id} plan={plan}
              onExport={() => onExport(plan)}
              onSubmit={() => { setPlan(prev => ({ ...prev, status:'submitted', updatedAt:new Date().toISOString() })); onExit(); }} />;
          }
          const v = (plan.sections[section.id] || {})[f.id];
          return <WizardQuestion key={f.id} field={f} value={v} plan={plan}
            onChange={val => updateField(section.id, f.id, val)} />;
        })}
      </div>

      <div className="flex justify-between mt-6">
        <button onClick={prev} className="px-5 py-2 rounded-full border-2 font-bold" style={{ borderColor: PURPLE, color: PURPLE }}>
          {stepIdx===0 ? '← Exit' : '← Back'}
        </button>
        {!isLast ? (
          <button onClick={next} className="px-6 py-2 rounded-full" style={{ backgroundColor: GOLD, color:'#000', fontWeight:'bold' }}>
            Next →
          </button>
        ) : (
          <button onClick={onExit} className="px-6 py-2 rounded-full text-white font-bold" style={{ backgroundColor: BLUE }}>
            Finish
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   17. WORD DOC GENERATORS
   ============================================================ */
const HEADER_WARNING = "⚠️ UNCONTROLLED IF PRINTED — CHECK nsw.scouts.com.au FOR CURRENT VERSION";
function dx(){ return window.docx; }

function makeHeaderFooter(filename){
  const { Header, Footer, Paragraph, TextRun, AlignmentType } = dx();
  return {
    headers: { default: new Header({ children: [ new Paragraph({ alignment: AlignmentType.CENTER,
      children: [ new TextRun({ text: HEADER_WARNING, bold:true, color:"B45309", size:18 }) ] }) ] }) },
    footers: { default: new Footer({ children: [ new Paragraph({ alignment: AlignmentType.CENTER,
      children: [ new TextRun({ text: filename + " · Generated by 1st Jerra Scout Planner " + todayStr(), size:16, color:"888888" }) ] }) ] }) }
  };
}

function titleBlock(docType, plan){
  const { Paragraph, TextRun } = dx();
  return [
    new Paragraph({ children:[ new TextRun({ text:"1st Jerrabomberra Scout Group — " + docType, bold:true, size:56, color:"6B2D8B" }) ] }),
    new Paragraph({ children:[ new TextRun({ text:(plan.title||'Untitled') + "  ·  " + formatDate(plan.activityDate), italics:true, size:24 }) ] }),
    new Paragraph({ text:"" })
  ];
}

function shadedCell(text, { bold, shade, width } = {}){
  const { TableCell, Paragraph, TextRun, WidthType } = dx();
  return new TableCell({
    width: width ? { size: width, type: WidthType.PERCENTAGE } : undefined,
    shading: shade ? { fill: shade } : undefined,
    children: [ new Paragraph({ children:[ new TextRun({ text: String(text==null?'':text), bold: !!bold, color: shade==="6B2D8B" ? "FFFFFF" : "000000" }) ] }) ]
  });
}

function buildTable(rows, headerRow){
  const { Table, TableRow, WidthType, BorderStyle } = dx();
  const border = { style: BorderStyle.SINGLE, size:1, color:"CCCCCC" };
  const borders = { top:border, bottom:border, left:border, right:border, insideHorizontal:border, insideVertical:border };
  const trs = [];
  if(headerRow){
    trs.push(new TableRow({ tableHeader:true, children: headerRow.map(h => shadedCell(h, { bold:true, shade:"6B2D8B" })) }));
  }
  rows.forEach((r, i) => {
    const shade = i % 2 === 1 ? "F3F4F6" : "FFFFFF";
    trs.push(new TableRow({ children: r.map((c, ci) => shadedCell(c, { bold: !headerRow && ci===0, shade })) }));
  });
  return new Table({ width:{ size:100, type:WidthType.PERCENTAGE }, borders, rows: trs });
}

function downloadDoc(doc, filename){
  return dx().Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  });
}

function generateActivityPlan(plan){
  const { Document } = dx();
  const s = plan.sections;
  const get = (sec, f) => (s[sec] && s[sec][f]) || '';
  const equip = (s.equipment && s.equipment.selectedItems || []).map(i=>i.item).join(', ');
  const rows = [
    ["Activity title", plan.title || ''],
    ["Scout Group", get('activityInfo','s1_group') || '1st Jerrabomberra Scout Group'],
    ["Activity type", plan.activityType],
    ["Date", formatDate(plan.activityDate)],
    ["Location", get('location','l1_name')],
    ["Start point", get('location','l2_start')],
    ["Finish point", get('location','l3_finish')],
    ["Park / tenure", get('location','l5_tenure')],
    ["AA Leader", get('leadership','ld1_aaLeader')],
    ["Mentoring guide", get('activityInfo','s1_mentor')],
    ["Participants", get('participants','p1_youthCount') + " scouts, " + get('participants','p4_leaderCount') + " leaders"],
    ["OAS stage", get('participants','p2_oasStage')],
    ["Supervision", get('supervision','sv1_type')],
    ["Primary comms", get('comms','c1_primary')],
    ["Backup comms", get('comms','c2_alternate')],
    ["Safe havens", get('location','l7_safeHavens')],
    ["Overdue time", get('timing','t3_overdue')],
    ["Emergency home contact", get('timing','t4_emergContact')],
    ["Cancellation triggers", get('emergencyPlan','e4_cancel')],
    ["Equipment summary", equip]
  ];
  const fn = "Activity_Plan.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn),
    children:[ ...titleBlock("Activity Plan", plan), buildTable(rows) ] }] });
  return downloadDoc(doc, fn);
}

function generateRiskAssessment(plan){
  const { Document } = dx();
  const hazards = (plan.sections.safety && plan.sections.safety.hazards) || [];
  const rows = hazards.map(h => [
    h.hazard, h.zone || '', h.initial_risk || '',
    Array.isArray(h.controls) ? h.controls.join('; ') : (h.controls || ''),
    h.residual_risk || ''
  ]);
  if(rows.length === 0) rows.push(["No hazards recorded","","","",""]);
  const fn = "Risk_Assessment.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn),
    children:[ ...titleBlock("Risk Assessment", plan),
      buildTable(rows, ["Hazard","Zone","Initial Risk","Controls","Residual Risk"]) ] }] });
  return downloadDoc(doc, fn);
}

function generateEmergencyPlan(plan){
  const { Document, Paragraph, TextRun } = dx();
  const s = plan.sections;
  const get = (sec,f) => (s[sec] && s[sec][f]) || '';
  let steps = (get('emergencyPlan','e3_steps') || '').split('\n').filter(x=>x.trim());
  const devices = get('emergencyPlan','e5_commsDevices');
  const children = [ ...titleBlock("Emergency Action Plan", plan) ];
  children.push(new Paragraph({ children:[ new TextRun({ text:"Emergency action steps", bold:true, size:26, color:"6B2D8B" }) ] }));
  if(steps.length === 0) steps = ["Make scene safe", "Call 000", "Provide first aid", "Contact emergency home contact", "Contact leader"];
  steps.forEach((st,i) => children.push(new Paragraph({ children:[ new TextRun({ text:(i+1)+". "+st }) ] })));
  children.push(new Paragraph({ text:"" }));
  const rows = [
    ["Nearest hospital", get('emergencyPlan','e1_hospital')],
    ["Nearest police", get('emergencyPlan','e2_police')],
    ["Emergency home contact", get('timing','t4_emergContact')],
    ["Overdue time", get('timing','t3_overdue')],
    ["Communication devices", Array.isArray(devices) ? devices.join(', ') : devices],
    ["Cancellation triggers", get('emergencyPlan','e4_cancel')]
  ];
  children.push(buildTable(rows));
  const fn = "Emergency_Action_Plan.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn), children }] });
  return downloadDoc(doc, fn);
}

function generatePackingList(plan){
  const { Document } = dx();
  const items = (plan.sections.equipment && plan.sections.equipment.selectedItems) || [];
  const rows = items.map(i => [i.item, i.category]);
  if(rows.length === 0) rows.push(["No items selected",""]);
  const fn = "Packing_List.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn),
    children:[ ...titleBlock("Packing List", plan), buildTable(rows, ["Item","Category"]) ] }] });
  return downloadDoc(doc, fn);
}

function generateMenuWater(plan){
  const { Document } = dx();
  const s = plan.sections;
  const get = (sec,f) => (s[sec] && s[sec][f]) || '';
  const rows = [
    ["Meals", get('menuWater','m1_meals')],
    ["Water plan", get('menuWater','m2_water')],
    ["Dietary needs & allergies", get('menuWater','m3_dietary')],
    ["Estimated cost per person", get('menuWater','m4_cost') ? "$"+get('menuWater','m4_cost') : '']
  ];
  const fn = "Menu_Water_Plan.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn),
    children:[ ...titleBlock("Menu & Water Plan", plan), buildTable(rows) ] }] });
  return downloadDoc(doc, fn);
}

function generateAllDocs(plan){
  if(!window.docx){ alert("Document library is still loading — please try again in a moment."); return; }
  generateActivityPlan(plan)
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateRiskAssessment(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateEmergencyPlan(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generatePackingList(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateMenuWater(plan))
    .catch(err => { console.error(err); alert("Something went wrong generating documents: " + err.message); });
}

/* ============================================================
   Build a fresh plan, optionally seeded from a library template
   ============================================================ */
function emptySections(){
  return { activityInfo:{}, participants:{}, supervision:{}, location:{}, timing:{}, safety:{},
    emergencyPlan:{}, equipment:{}, menuWater:{}, transport:{}, comms:{}, leadership:{}, environment:{}, review:{} };
}

function newPlan(type){
  const now = new Date().toISOString();
  const sections = emptySections();
  sections.activityInfo.s1_group = "1st Jerrabomberra Scout Group";
  return { id: generateId(), activityType: type, title:'', createdAt: now, updatedAt: now,
    activityDate:'', sections, completedSections:[], percentComplete:0, status:'draft' };
}

function planFromTemplate(act){
  const now = new Date().toISOString();
  const sections = emptySections();
  const ai = sections.activityInfo;
  ai.s1_name = act.title; ai.s1_group = "1st Jerrabomberra Scout Group"; ai.s1_dates = act.date || '';
  ai.s1_season = act.weather && act.weather.season;
  if(act.location){
    sections.location.l1_name = act.location.name || '';
    sections.location.l2_start = act.location.start_point || '';
    sections.location.l3_finish = act.location.finish_point || '';
    sections.location.l5_tenure = act.location.park || act.location.tenure || '';
    sections.location.l7_safeHavens = (act.safe_havens||[]).join('\n');
  }
  if(act.participants){
    sections.participants.p1_youthCount = act.participants.youth_count;
    sections.participants.p4_leaderCount = act.participants.leader_count;
    sections.participants.p2_oasStage = act.oas_stage;
  }
  sections.supervision.sv1_type = (act.supervision||'').toLowerCase().includes('indirect') ?
    "Indirect — leader nearby but you work independently" : "Direct — leader right beside you";
  if(act.comms){ sections.comms.c1_primary = act.comms.primary || ''; sections.comms.c2_alternate = act.comms.alternate || ''; }
  if(act.menu){ sections.menuWater.m1_meals = act.menu.meals || ''; sections.menuWater.m2_water = act.menu.water_plan || ''; }
  sections.emergencyPlan.e1_hospital = act.hospital || '';
  sections.emergencyPlan.e4_cancel = (act.cancellation_triggers||[]).join(', ');

  const zones = ZONES[act.type] || ZONES.hike;
  const hazardState = {};
  (act.hazards||[]).forEach(h => {
    const hl = h.hazard.toLowerCase();
    let zone = zones[zones.length-1].label;
    for(const z of zones){ const kws = ZONE_KEYWORDS[z.label]||[]; if(kws.some(k=>hl.includes(k))){ zone = z.label; break; } }
    const key = zone + '|' + h.hazard;
    hazardState[key] = { hazard:h.hazard, zone, status:'yes', initial_risk:h.initial_risk||'MEDIUM',
      controls:(h.controls||[]).join('\n'), residual_risk:h.residual_risk||'LOW', libInitial:h.initial_risk };
  });
  sections.safety.hazardState = hazardState;
  sections.safety.hazards = Object.values(hazardState).map(h => ({ hazard:h.hazard, zone:h.zone, status:h.status,
    initial_risk:h.initial_risk, controls:h.controls, residual_risk:h.residual_risk }));

  const pl = LIBRARY_DATA.packing_lists[act.type] || [];
  sections.equipment.selectedItems = pl.filter(p=>p.category==='essential').map(p=>({ item:p.item, category:p.category, weight:p.weight, emoji:p.emoji, selected:true }));

  const base = { id: generateId(), activityType: act.type, title: act.title, createdAt: now, updatedAt: now,
    activityDate: act.date || '', sections, completedSections:[], percentComplete:0, status:'draft' };
  const { completed, percent } = computePercent(base);
  base.completedSections = completed; base.percentComplete = percent;
  return base;
}

/* ============================================================
   18. APP
   ============================================================ */
function App(){
  const [screen, setScreen] = useState('dashboard');
  const [plans, setPlans] = useState(() => loadPlans());
  const [currentPlan, setCurrentPlan] = useState(null);

  useEffect(() => { savePlans(plans); }, [plans]);

  function upsertPlan(updated){
    setPlans(prev => {
      const exists = prev.some(p => p.id === updated.id);
      return exists ? prev.map(p => p.id === updated.id ? updated : p) : [updated, ...prev];
    });
  }

  function setWizardPlan(updater){
    setCurrentPlan(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      upsertPlan(next);
      return next;
    });
  }

  function startNew(type){
    const p = newPlan(type);
    setCurrentPlan(p); upsertPlan(p); setScreen('wizard');
  }
  function useTemplate(act){
    const p = planFromTemplate(act);
    setCurrentPlan(p); upsertPlan(p); setScreen('wizard');
  }
  function openPlan(p){ setCurrentPlan(p); setScreen('planDetail'); }
  function deletePlan(){
    setPlans(prev => prev.filter(p => p.id !== currentPlan.id));
    setCurrentPlan(null); setScreen('dashboard');
  }
  function approvePlan(){
    const updated = { ...currentPlan, status:'approved', updatedAt:new Date().toISOString() };
    setCurrentPlan(updated); upsertPlan(updated);
  }

  return (
    <div className="min-h-screen bg-gray-100 pb-12">
      <Header screen={screen}
        onHome={()=>setScreen('dashboard')}
        onLibrary={()=>setScreen('library')} />

      {screen === 'dashboard' &&
        <Dashboard plans={plans} onNew={()=>setScreen('newPlan')} onOpen={openPlan} />}

      {screen === 'newPlan' &&
        <NewPlan onPick={startNew} onCancel={()=>setScreen('dashboard')} />}

      {screen === 'wizard' && currentPlan &&
        <Wizard plan={currentPlan} setPlan={setWizardPlan}
          onExit={()=>setScreen('planDetail')} onExport={generateAllDocs} />}

      {screen === 'library' &&
        <LibraryScreen onUseTemplate={useTemplate} />}

      {screen === 'planDetail' && currentPlan &&
        <PlanDetail plan={currentPlan}
          onEdit={()=>setScreen('wizard')}
          onExport={generateAllDocs}
          onDelete={deletePlan}
          onApprove={approvePlan}
          onBack={()=>setScreen('dashboard')} />}

      <PolicyBanner />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
