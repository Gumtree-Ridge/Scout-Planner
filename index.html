// Sections that count toward completeness (skip review)
const COMPLETABLE_SECTIONS = WIZARD_SECTIONS.filter(s => s.id !== 'review').map(s => s.id);

function sectionHasContent(plan, sectionId){
  const sec = (plan.sections && plan.sections[sectionId]) || {};
  if(sectionId === 'safety'){ return Array.isArray(sec.hazards) && sec.hazards.length > 0; }
  if(sectionId === 'equipment'){ return Array.isArray(sec.selectedItems) && sec.selectedItems.length > 0; }
  if(sectionId === 'budget'){ return Array.isArray(sec.items) && sec.items.some(i => parseFloat(i.amount) > 0); }
  return Object.keys(sec).some(k => { const v = sec[k]; return v !== undefined && v !== '' && !(Array.isArray(v) && v.length===0); });
}

function computePercent(plan){
  const done = COMPLETABLE_SECTIONS.filter(id => sectionHasContent(plan, id));
  return { completed: done, percent: Math.round((done.length / COMPLETABLE_SECTIONS.length) * 100) };
}

function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

/* How many days does the activity run? 1 = single day, null = no start date,
   -1 = invalid (finish before start). */
function activityDurationDays(plan){
  const ai = (plan.sections && plan.sections.activityInfo) || {};
  if(!ai.s1_dates) return null;
  if(!ai.s1_dateEnd) return 1;
  const d1 = new Date(ai.s1_dates), d2 = new Date(ai.s1_dateEnd);
  if(isNaN(d1) || isNaN(d2)) return 1;
  const days = Math.round((d2.getTime() - d1.getTime()) / (24*3600*1000)) + 1;
  return days >= 1 ? days : -1;
}

/* Australian (southern hemisphere) seasons — derived from the activity date.
   Dec–Feb = summer, Mar–May = autumn, Jun–Aug = winter, Sep–Nov = spring. */
function seasonFromDate(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  if(isNaN(d)) return null;
  const m = d.getMonth(); // 0 = Jan
  if(m === 11 || m <= 1) return 'summer';
  if(m <= 4) return 'autumn';
  if(m <= 7) return 'winter';
  return 'spring';
}

/* ============================================================
   6. TIMELINE STRIP (SVG)
   ============================================================ */
function TimelineStrip({ activityDate }){
  if(!activityDate) return null;
  const target = new Date(activityDate);
  const wk = 7*24*3600*1000;
  const milestones = [
    { label:"Concept", weeks:-8 },
    { label:"Plan submitted", weeks:-6 },
    { label:"Leader review", weeks:-5 },
    { label:"Final approval", weeks:-3 },
    { label:"Pre-activity brief", weeks:-1 },
    { label:"Activity day", weeks:0 }
  ].map(m => ({ ...m, date: new Date(target.getTime() + m.weeks*wk) }));

  let firstFutureIndex = milestones.findIndex(m => m.date.getTime() > TODAY.getTime());
  const states = milestones.map((m) => {
    const diffDays = Math.round((m.date.getTime() - TODAY.getTime()) / (24*3600*1000));
    if(Math.abs(diffDays) <= 3) return 'current';
    if(m.date.getTime() < TODAY.getTime()) return 'done';
    return 'upcoming';
  });
  const colorMap = { done:'#16a34a', current: GOLD, upcoming:'#9ca3af', overdue:'#dc2626' };
  const anyCurrent = states.includes('current');
  if(!anyCurrent && firstFutureIndex > 0){
    const idx = firstFutureIndex - 1;
    const diffDays = Math.round((milestones[idx].date.getTime() - TODAY.getTime()) / (24*3600*1000));
    if(diffDays < -3) states[idx] = 'overdue';
  }

  const W = 760, H = 130, padX = 60, y = 55;
  const step = (W - 2*padX) / (milestones.length - 1);

  return (
    <div className="bg-white rounded-xl shadow p-4 mb-6">
      <div className="font-bold mb-1" style={{ color: PURPLE }}>📅 Your Planning Timeline</div>
      <div className="text-xs text-gray-500 mb-2">Next activity: {formatDate(activityDate)}</div>
      <div className="overflow-x-auto scrollx">
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ minWidth: 700 }}>
          {milestones.map((m, i) => {
            if(i === 0) return null;
            const x1 = padX + (i-1)*step, x2 = padX + i*step;
            const lineDone = states[i-1] === 'done' || states[i-1] === 'current';
            return <line key={'l'+i} x1={x1} y1={y} x2={x2} y2={y}
              stroke={lineDone ? '#16a34a' : '#d1d5db'} strokeWidth="4" />;
          })}
          {milestones.map((m, i) => {
            const x = padX + i*step;
            const st = states[i];
            return (
              <g key={i}>
                {st === 'current' && <text x={x} y={y-22} textAnchor="middle" fontSize="18">🧍</text>}
                <circle cx={x} cy={y} r="11" fill={colorMap[st]} stroke="#fff" strokeWidth="2" />
                <text x={x} y={y+30} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#374151">{m.label}</text>
                <text x={x} y={y+46} textAnchor="middle" fontSize="10" fill="#6b7280">
                  {m.date.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
      {(() => {
        const daysToGo = Math.round((target.getTime() - TODAY.getTime()) / (24*3600*1000));
        if(daysToGo < 0) return (
          <div className="mt-2 text-xs font-bold rounded-lg px-3 py-2" style={{ backgroundColor:'#fee2e2', color:'#991b1b' }}>
            ⚠️ This activity date has already passed. Check the date in Section 1 — or if the activity is done, ask your leader about closing it out.
          </div>
        );
        if(daysToGo < 42) return (
          <div className="mt-2 text-xs font-bold rounded-lg px-3 py-2" style={{ backgroundColor:'#fef3c7', color:'#92400e' }}>
            ⏰ Only {daysToGo} day{daysToGo === 1 ? '' : 's'} to go — that's less than the 6–8 weeks adventurous activities need to plan properly. Talk to your leader today about whether there's enough time.
          </div>
        );
        return null;
      })()}
    </div>
  );
}

/* ============================================================
   10. RISK SCENE SECTION (Section 6)
   ============================================================ */
function RiskSceneSection({ activityType, sectionData, onChange }){
  const baseZones = ZONES[activityType] || ZONES.hike;
  const removedZones = sectionData.removedZones || [];
  const customZones = sectionData.customZones || [];
  const zones = baseZones.filter(z => !removedZones.includes(z.label)).concat(customZones);
  const [activeZone, setActiveZone] = useState(zones[0] ? zones[0].label : '');
  // If the active zone was just removed, fall back to the first remaining one
  const curZone = zones.some(z => z.label === activeZone) ? activeZone : (zones[0] ? zones[0].label : '');
  const [showCustom, setShowCustom] = useState(false);
  const [editKey, setEditKey] = useState(null);
  const [showZoneMgr, setShowZoneMgr] = useState(false);
  const [newZone, setNewZone] = useState({ label:'', emoji:'📍' });
  const [custom, setCustom] = useState({ hazard:'', initial:'MEDIUM', controls:'', residual:'LOW' });

  const hazardState = sectionData.hazardState || {};

  function update(newHazardState){
    const hazards = Object.values(newHazardState)
      .filter(h => h.status === 'yes')
      .map(h => ({ hazard:h.hazard, zone:h.zone, status:h.status, initial_risk:h.initial_risk, controls:h.controls, residual_risk:h.residual_risk }));
    const residuals = hazards.map(h => h.residual_risk);
    const overallRisk = residuals.includes('HIGH') ? 'HIGH' : residuals.includes('MEDIUM') ? 'MEDIUM' : hazards.length > 0 ? 'LOW' : 'Not assessed';
    onChange({ hazardState: newHazardState, hazards, overallRisk });
  }

  function removeZone(label){
    if(zones.length <= 1){ window.alert("You need at least one section in your risk assessment."); return; }
    const included = Object.values(hazardState).filter(h => h.zone === label && h.status === 'yes').length;
    if(included > 0 && !window.confirm('Removing "' + label + '" will also remove ' + included + ' hazard(s) you included there. Continue?')) return;
    const nextHz = {};
    Object.entries(hazardState).forEach(([k,h]) => { if(h.zone !== label) nextHz[k] = h; });
    const hazards = Object.values(nextHz).filter(h => h.status === 'yes')
      .map(h => ({ hazard:h.hazard, zone:h.zone, status:h.status, initial_risk:h.initial_risk, controls:h.controls, residual_risk:h.residual_risk }));
    const residuals = hazards.map(h => h.residual_risk);
    const overallRisk = residuals.includes('HIGH') ? 'HIGH' : residuals.includes('MEDIUM') ? 'MEDIUM' : hazards.length > 0 ? 'LOW' : 'Not assessed';
    const isCustomZone = customZones.some(z => z.label === label);
    onChange({ hazardState: nextHz, hazards, overallRisk,
      removedZones: isCustomZone ? removedZones : [...removedZones, label],
      customZones: isCustomZone ? customZones.filter(z => z.label !== label) : customZones });
    if(activeZone === label && zones.length > 1){
      const remaining = zones.filter(z => z.label !== label);
      setActiveZone(remaining[0].label);
    }
  }

  function restoreZone(label){
    onChange({ removedZones: removedZones.filter(l => l !== label) });
  }

  function addZone(){
    const name = newZone.label.trim();
    if(!name) return;
    if(zones.some(z => z.label.toLowerCase() === name.toLowerCase())){ window.alert("You already have a section with that name."); return; }
    onChange({ customZones: [...customZones, { label: name, emoji: newZone.emoji }] });
    setActiveZone(name);
    setNewZone({ label:'', emoji:'📍' });
    setShowZoneMgr(false);
  }

  function toggleZoneHazard(zone, lib){
    const key = zone + '|' + lib.hazard;
    const next = { ...hazardState };
    const existing = next[key];
    const nowSelected = !(existing && existing.status === 'yes');
    if(existing){
      // Keep any adjustments the scout already made — just flip inclusion
      next[key] = { ...existing, status: nowSelected ? 'yes' : 'no' };
    } else {
      next[key] = {
        hazard: lib.hazard, zone,
        status: 'yes',
        initial_risk: lib.initial_risk,
        controls: (lib.controls || []).join('\n'),
        residual_risk: lib.residual_risk,
      };
    }
    if(!nowSelected && editKey === key) setEditKey(null);
    update(next);
  }

  function editHazard(key, field, value){
    const next = { ...hazardState };
    next[key] = { ...next[key], [field]: value };
    update(next);
  }

  function resetHazard(key, lib){
    const next = { ...hazardState };
    next[key] = { ...next[key], initial_risk: lib.initial_risk,
      controls: (lib.controls || []).join('\n'), residual_risk: lib.residual_risk };
    update(next);
  }

  function isAdjusted(h, lib){
    if(!h || !lib) return false;
    return h.initial_risk !== lib.initial_risk
      || h.residual_risk !== lib.residual_risk
      || (h.controls || '') !== (lib.controls || []).join('\n');
  }

  function addCustom(){
    if(!custom.hazard.trim()) return;
    const key = 'custom:' + custom.hazard;
    const next = { ...hazardState };
    next[key] = { hazard: custom.hazard, zone: curZone, status:'yes',
      initial_risk: custom.initial, controls: custom.controls, residual_risk: custom.residual, custom:true };
    update(next);
    setCustom({ hazard:'', initial:'MEDIUM', controls:'', residual:'LOW' });
    setShowCustom(false);
  }

  function removeCustom(key){
    const next = { ...hazardState };
    delete next[key];
    update(next);
  }

  const reviewedZones = new Set(
    Object.values(hazardState)
      .filter(h => h.status === 'yes' || h.status === 'no')
      .map(h => h.zone)
  );

  const zoneHazards = ZONE_HAZARDS[curZone] || [];
  const customInZone = Object.entries(hazardState).filter(([k,h]) => h.custom && h.zone === curZone && h.status === 'yes');
  const prompts = ZONE_PROMPTS[curZone] || [];

  const riskEmoji = { HIGH:'🔴', MEDIUM:'🟡', LOW:'🟢' };
  const riskBg = { HIGH:'#fee2e2', MEDIUM:'#fef3c7', LOW:'#dcfce7' };
  const riskBorder = { HIGH:'#dc2626', MEDIUM: GOLD, LOW:'#16a34a' };

  const allSelectedHazards = Object.values(hazardState).filter(h => h.status === 'yes');

  return (
    <div>
      {/* Zone tabs */}
      <div className="overflow-x-auto scrollx -mx-1 mb-2">
        <div className="flex gap-2 px-1 pb-1">
          {zones.map(z => {
            const active = z.label === curZone;
            const reviewed = reviewedZones.has(z.label);
            return (
              <div key={z.label} onClick={() => setActiveZone(z.label)} role="button"
                className="relative flex-shrink-0 rounded-xl px-3 py-2 text-center border-2 min-w-[90px] cursor-pointer"
                style={{ borderColor: active ? BLUE : (reviewed ? '#16a34a' : '#e5e7eb'),
                  backgroundColor: active ? '#e0f2fe' : '#fff' }}>
                <span onClick={e => { e.stopPropagation(); removeZone(z.label); }}
                  title={"Remove " + z.label + " from this activity"}
                  className="absolute top-0.5 right-1.5 text-xs text-gray-300 hover:text-red-500 font-bold">✕</span>
                <div className="text-2xl">{z.emoji}</div>
                <div className="text-xs font-bold" style={{ color: PURPLE }}>{z.label}</div>
                {reviewed && <div className="text-[10px] text-green-600">✓ reviewed</div>}
              </div>
            );
          })}
          <div onClick={() => setShowZoneMgr(!showZoneMgr)} role="button"
            className="flex-shrink-0 rounded-xl px-3 py-2 text-center border-2 border-dashed min-w-[90px] cursor-pointer flex flex-col justify-center"
            style={{ borderColor: PURPLE, backgroundColor: showZoneMgr ? '#f3e8ff' : '#fff' }}>
            <div className="text-2xl">➕</div>
            <div className="text-xs font-bold" style={{ color: PURPLE }}>Add / restore</div>
          </div>
        </div>
      </div>
      <div className="text-xs text-gray-400 mb-3">Not part of YOUR trip? Tap the ✕ on a section to remove it — e.g. remove "Scout Hall" if you're meeting at the trailhead instead.</div>

      {showZoneMgr && (
        <div className="bg-white rounded-xl shadow p-4 mb-4 space-y-3 border-2" style={{ borderColor: PURPLE }}>
          <div className="text-sm font-bold" style={{ color: PURPLE }}>🗺️ Customise your trip sections</div>
          {removedZones.length > 0 && (
            <div>
              <div className="text-xs text-gray-500 mb-1">Bring back a removed section:</div>
              <div className="flex flex-wrap gap-2">
                {removedZones.map(l => {
                  const bz = baseZones.find(z => z.label === l);
                  return (
                    <button key={l} onClick={() => restoreZone(l)}
                      className="px-3 py-1 rounded-full border text-xs font-bold" style={{ borderColor:'#16a34a', color:'#16a34a' }}>
                      ↩️ {bz ? bz.emoji + ' ' : ''}{l}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
          <div>
            <div className="text-xs text-gray-500 mb-1">Or add your own section — anywhere your activity goes that isn't listed:</div>
            <div className="flex gap-2 flex-wrap items-center">
              <select value={newZone.emoji} onChange={e => setNewZone({ ...newZone, emoji: e.target.value })} className="border rounded p-1 text-xl">
                {['📍','🚉','🌉','⛺','🏞️','🛶','🚏','🌊','🧗','🔦'].map(e2 => <option key={e2} value={e2}>{e2}</option>)}
              </select>
              <input value={newZone.label} onChange={e => setNewZone({ ...newZone, label: e.target.value })}
                placeholder="e.g. Train Station, River Crossing, Lookout"
                className="border rounded p-2 text-sm flex-1 min-w-[180px]" />
              <button onClick={addZone} className="px-4 py-1 rounded-full font-bold text-sm" style={{ backgroundColor: GOLD, color:'#000' }}>Add section</button>
            </div>
          </div>
        </div>
      )}

      <div className="text-sm font-bold mb-1" style={{ color: PURPLE }}>
        {reviewedZones.size} of {zones.length} zones reviewed
      </div>
      <div className="text-sm text-gray-600 mb-3">
        Tap the hazards below that could happen at <b>{curZone}</b> for your activity.
      </div>

      {/* Hazard tile grid */}
      {zoneHazards.length === 0 && customInZone.length === 0 && (
        <div className="text-sm text-gray-400 italic mb-4">No suggested hazards for this zone — add your own below!</div>
      )}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        {zoneHazards.map((lib, i) => {
          const key = curZone + '|' + lib.hazard;
          const h = hazardState[key] || {};
          const selected = h.status === 'yes';
          const ir = (selected && h.initial_risk) || lib.initial_risk || 'MEDIUM';
          const adjusted = selected && isAdjusted(h, lib);
          const editing = editKey === key;
          return (
            <div key={i} className={editing ? 'sm:col-span-2' : ''}>
              <div onClick={() => toggleZoneHazard(curZone, lib)} role="button"
                className="text-left rounded-xl p-3 border-2 transition cursor-pointer"
                style={{ borderColor: selected ? riskBorder[ir] : '#e5e7eb',
                  backgroundColor: selected ? riskBg[ir] : '#fff' }}>
                <div className="flex items-start gap-2">
                  <span className="text-xl flex-shrink-0">{riskEmoji[ir] || '🟡'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-bold leading-tight" style={{ color: PURPLE }}>{lib.hazard}</div>
                    <div className="text-xs text-gray-500 mt-1">Initial risk: {ir}{adjusted && <span className="font-bold" style={{ color: PURPLE }}> · ✏️ adjusted by you</span>}</div>
                    {selected
                      ? <div className="flex items-center gap-3 mt-1">
                          <span className="text-xs font-bold" style={{ color: riskBorder[ir] }}>✅ Included</span>
                          <span onClick={e => { e.stopPropagation(); setEditKey(editing ? null : key); }}
                            className="text-xs font-bold underline" style={{ color: PURPLE }}>
                            {editing ? 'Close' : '✏️ Adjust rating & controls'}
                          </span>
                        </div>
                      : <div className="text-xs text-gray-400 mt-1">Tap to include</div>
                    }
                  </div>
                </div>
              </div>
              {selected && editing && (
                <div className="bg-white rounded-xl shadow p-4 mt-2 space-y-3 border-2" style={{ borderColor: PURPLE }}>
                  <div className="text-xs text-gray-600">These are the <b>suggested</b> ratings and controls from past 1st Jerra activities — but every trip is different. Think about YOUR route, weather and group, then adjust if you need to.</div>
                  <div className="flex gap-2 items-center text-sm flex-wrap">
                    <label className="font-bold">Initial risk</label>
                    <select value={h.initial_risk || 'MEDIUM'} onChange={e => editHazard(key, 'initial_risk', e.target.value)} className="border rounded p-1">
                      {['LOW','MEDIUM','HIGH'].map(o => <option key={o}>{o}</option>)}
                    </select>
                    <label className="font-bold">Risk after controls</label>
                    <select value={h.residual_risk || 'LOW'} onChange={e => editHazard(key, 'residual_risk', e.target.value)} className="border rounded p-1">
                      {['LOW','MEDIUM','HIGH'].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>
                  {h.residual_risk === 'HIGH' && (
                    <div className="rounded p-2 text-xs font-bold" style={{ backgroundColor:'#fee2e2', color:'#991b1b' }}>
                      🛑 If the risk is still HIGH even with your controls, something about the activity probably needs to change. Talk to your leader before going any further.
                    </div>
                  )}
                  <div>
                    <label className="text-sm font-bold">How will you control this risk?</label>
                    <textarea value={h.controls || ''} onChange={e => editHazard(key, 'controls', e.target.value)}
                      rows={4} className="w-full border rounded p-2 text-sm mt-1"
                      placeholder="One control per line" />
                    <div className="text-xs text-gray-400 mt-1">Tip: add controls specific to YOUR activity — don't just accept the list.</div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => setEditKey(null)} className="px-4 py-1 rounded-full font-bold text-sm" style={{ backgroundColor: GOLD, color:'#000' }}>Done</button>
                    {adjusted && <button onClick={() => resetHazard(key, lib)} className="px-4 py-1 rounded-full border text-sm">↩️ Reset to suggested</button>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Custom hazards in this zone */}
      {customInZone.length > 0 && (
        <div className="mb-4 space-y-2">
          {customInZone.map(([key, h]) => {
            const editing = editKey === key;
            return (
              <div key={key}>
                <div className="bg-white rounded-xl shadow p-3 border-l-4 flex items-start justify-between gap-2" style={{ borderColor: BLUE }}>
                  <div>
                    <div className="text-sm font-bold" style={{ color: PURPLE }}>⭐ {h.hazard}</div>
                    <div className="text-xs text-gray-500">Your specific risk · Initial: {h.initial_risk} → Residual: {h.residual_risk}</div>
                    <span onClick={() => setEditKey(editing ? null : key)}
                      className="text-xs font-bold underline cursor-pointer" style={{ color: PURPLE }}>
                      {editing ? 'Close' : '✏️ Adjust rating & controls'}
                    </span>
                  </div>
                  <button onClick={() => removeCustom(key)} className="text-red-400 text-lg leading-none flex-shrink-0">✕</button>
                </div>
                {editing && (
                  <div className="bg-white rounded-xl shadow p-4 mt-2 space-y-3 border-2" style={{ borderColor: PURPLE }}>
                    <div className="flex gap-2 items-center text-sm flex-wrap">
                      <label className="font-bold">Initial risk</label>
                      <select value={h.initial_risk || 'MEDIUM'} onChange={e => editHazard(key, 'initial_risk', e.target.value)} className="border rounded p-1">
                        {['LOW','MEDIUM','HIGH'].map(o => <option key={o}>{o}</option>)}
                      </select>
                      <label className="font-bold">Risk after controls</label>
                      <select value={h.residual_risk || 'LOW'} onChange={e => editHazard(key, 'residual_risk', e.target.value)} className="border rounded p-1">
                        {['LOW','MEDIUM','HIGH'].map(o => <option key={o}>{o}</option>)}
                      </select>
                    </div>
                    {h.residual_risk === 'HIGH' && (
                      <div className="rounded p-2 text-xs font-bold" style={{ backgroundColor:'#fee2e2', color:'#991b1b' }}>
                        🛑 If the risk is still HIGH even with your controls, something about the activity probably needs to change. Talk to your leader before going any further.
                      </div>
                    )}
                    <div>
                      <label className="text-sm font-bold">How will you control this risk?</label>
                      <textarea value={h.controls || ''} onChange={e => editHazard(key, 'controls', e.target.value)}
                        rows={4} className="w-full border rounded p-2 text-sm mt-1" placeholder="One control per line" />
                    </div>
                    <button onClick={() => setEditKey(null)} className="px-4 py-1 rounded-full font-bold text-sm" style={{ backgroundColor: GOLD, color:'#000' }}>Done</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Think about prompts */}
      {prompts.length > 0 && (
        <div className="rounded-xl p-4 mb-4" style={{ backgroundColor:'#fef3c7' }}>
          <div className="font-bold text-sm mb-2">💭 Think about...</div>
          <ul className="space-y-1">
            {prompts.map((p, i) => (
              <li key={i} className="text-sm flex gap-2">
                <span className="text-gray-400">•</span>
                <span>{p}</span>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* Add specific risk */}
      <div className="mb-6">
        {!showCustom ? (
          <button onClick={() => setShowCustom(true)}
            className="px-4 py-2 rounded-full border-2 text-sm font-bold"
            style={{ borderColor: BLUE, color: BLUE }}>➕ Add a specific risk for this activity</button>
        ) : (
          <div className="bg-white rounded-xl shadow p-4 space-y-3">
            <div className="text-sm font-bold" style={{ color: PURPLE }}>Add a specific risk</div>
            <div className="text-xs text-gray-500">Think about anything special about THIS specific activity that isn't already in the list above.</div>
            <input value={custom.hazard} onChange={e=>setCustom({...custom, hazard:e.target.value})}
              placeholder="e.g. 'The road crossing near our trailhead is very busy'"
              className="w-full border rounded p-2 text-sm" />
            <div className="rounded p-2 text-xs" style={{ backgroundColor:'#e0f2fe' }}>
              💡 Things to think about: Is there anything unique about this specific location? Any particular times of day that are riskier? Any conditions that make it harder or more dangerous than usual?
            </div>
            <div className="flex gap-2 items-center text-sm flex-wrap">
              <label className="font-bold">Initial risk</label>
              <select value={custom.initial} onChange={e=>setCustom({...custom, initial:e.target.value})} className="border rounded p-1">
                {['LOW','MEDIUM','HIGH'].map(o=><option key={o}>{o}</option>)}
              </select>
              <label className="font-bold">Residual risk</label>
              <select value={custom.residual} onChange={e=>setCustom({...custom, residual:e.target.value})} className="border rounded p-1">
                {['LOW','MEDIUM','HIGH'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <textarea value={custom.controls} onChange={e=>setCustom({...custom, controls:e.target.value})}
              rows={3} placeholder="How will you control or manage this risk? List your safety measures." className="w-full border rounded p-2 text-sm" />
            <div className="flex gap-2">
              <button onClick={addCustom} className="px-4 py-1 rounded-full font-bold" style={{ backgroundColor: GOLD, color:'#000' }}>Add risk</button>
              <button onClick={() => setShowCustom(false)} className="px-4 py-1 rounded-full border text-sm">Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* Summary of all selected hazards */}
      {allSelectedHazards.length > 0 && (
        <div className="bg-white rounded-xl shadow p-4">
          {/* Overall Risk Rating */}
          {(() => {
            const residuals = allSelectedHazards.map(h => h.residual_risk);
            let overall, overallBg, overallText, overallEmoji;
            if(residuals.includes('HIGH')){ overall='HIGH'; overallBg='#fee2e2'; overallText='#dc2626'; overallEmoji='🔴'; }
            else if(residuals.includes('MEDIUM')){ overall='MEDIUM'; overallBg='#fef3c7'; overallText='#b45309'; overallEmoji='🟡'; }
            else { overall='LOW'; overallBg='#dcfce7'; overallText='#16a34a'; overallEmoji='🟢'; }
            return (
              <div className="flex items-center gap-3 mb-4 p-3 rounded-xl" style={{ backgroundColor: overallBg }}>
                <span className="text-2xl">{overallEmoji}</span>
                <div>
                  <div className="text-xs text-gray-500 font-medium">Overall Residual Risk Rating</div>
                  <div className="text-lg font-bold" style={{ color: overallText }}>{overall}</div>
                </div>
              </div>
            );
          })()}
          <div className="font-bold mb-3 text-sm" style={{ color: PURPLE }}>📋 Your Risk Assessment so far ({allSelectedHazards.length} hazards)</div>
          <div className="space-y-1">
            {allSelectedHazards.map((h, i) => {
              const c = riskColor(h.residual_risk);
              return (
                <div key={i} className="flex items-center justify-between text-sm py-1 border-b last:border-0">
                  <span className="flex-1 text-xs">{h.hazard} <span className="text-gray-400">({h.zone})</span></span>
                  <span className="text-xs px-2 py-0.5 rounded-full font-bold ml-2 whitespace-nowrap" style={{ backgroundColor: c.bg, color: c.text }}>{h.residual_risk}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   11. EQUIPMENT ROOM SECTION (Section 8)
   ============================================================ */
function EquipmentRoomSection({ activityType, sectionData, onChange, plan }){
  const baseList = LIBRARY_DATA.packing_lists[activityType] || [];
  const stored = sectionData.selectedItems;

  const initItems = useMemo(() => {
    if(stored && stored.length){
      const byName = {};
      stored.forEach(s => { byName[s.item] = s; });
      const merged = baseList.map(b => ({ ...b, selected: byName[b.item] ? byName[b.item].selected : (b.category==='essential') }));
      const customs = stored.filter(s => !baseList.some(b => b.item === s.item)).map(c => ({ ...c, emoji: c.emoji || '📦', selected:true }));
      return [...merged, ...customs];
    }
    return baseList.map(b => ({ ...b, selected: b.category === 'essential' }));
  }, [activityType]); // eslint-disable-line

  const [list, setList] = useState(initItems);
  const [showAdd, setShowAdd] = useState(false);
  const [newItem, setNewItem] = useState({ item:'', category:'essential', weight:0.2, emoji:'📦' });

  useEffect(() => {
    onChange({ selectedItems: list.filter(i => i.selected).map(i => ({ item:i.item, category:i.category, weight:i.weight, emoji:i.emoji, selected:true })) });
  }, [list]);

  const weight = list.filter(i => i.selected).reduce((s,i)=>s+(i.weight||0),0);
  const weightColor = weight > 10 ? '#dc2626' : (weight > 8 ? GOLD : '#16a34a');

  function toggle(idx){
    setList(list.map((it,i) => i===idx ? { ...it, selected: !it.selected } : it));
  }
  function addItem(){
    if(!newItem.item.trim()) return;
    setList([...list, { ...newItem, weight: parseFloat(newItem.weight)||0, selected:true }]);
    setNewItem({ item:'', category:'essential', weight:0.2, emoji:'📦' });
    setShowAdd(false);
  }

  const catBadge = { essential:'🔴 Essential', recommended:'🟡 Recommended', optional:'🟢 Optional' };
  const catColor = { essential:'#dc2626', recommended: GOLD, optional:'#16a34a' };

  const libAct = libraryForType(activityType)[0];
  const ai = plan.sections.activityInfo || {};
  // Season comes from the scout's own activity date first (Australian seasons),
  // then any stored value, then the library example as a last resort.
  const season = seasonFromDate(plan.activityDate || ai.s1_dates)
    || ai.s1_season
    || (libAct && libAct.weather && libAct.weather.season)
    || 'the season';
  const loc = (plan.sections.location && plan.sections.location.l1_name) || (libAct && libAct.location && libAct.location.name) || 'your location';

  return (
    <div>
      <div className="rounded-xl p-3 mb-3 text-white text-sm" style={{ backgroundColor: BLUE }}>
        🌤️ Heads up: it'll be <b>{season}</b> around <b>{loc}</b>. Make sure you've packed weather-appropriate gear!
        {SEASON_TIPS[season] && <div className="text-xs opacity-90 mt-1">{SEASON_TIPS[season]}</div>}
      </div>
      <div className="rounded-xl p-3 mb-4 text-center font-bold text-white" style={{ backgroundColor: weightColor }}>
        🎒 Estimated pack weight: {weight.toFixed(2)} kg
        {weight > 10 && <div className="text-xs font-normal">That's over 10kg — try to cut some weight!</div>}
        {weight > 8 && weight <= 10 && <div className="text-xs font-normal">Getting heavy — keep an eye on it.</div>}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        {list.map((it, idx) => (
          <button key={idx} onClick={() => toggle(idx)}
            className="relative bg-white rounded-xl p-3 text-center border-4 transition"
            style={{ borderColor: it.selected ? catColor[it.category] : '#e5e7eb', opacity: it.selected ? 1 : 0.7 }}>
            {!it.selected && it.category === 'essential' && (
              <div className="absolute top-1 right-1 text-lg" title="Essential not packed!">⚠️</div>
            )}
            <div className="text-3xl mb-1">{it.emoji || '📦'}</div>
            <div className="text-xs font-bold leading-tight">{it.item}</div>
            <div className="text-[10px] mt-1 font-bold" style={{ color: catColor[it.category] }}>{catBadge[it.category]}</div>
          </button>
        ))}
      </div>

      <div className="mt-4">
        {!showAdd ? (
          <button onClick={() => setShowAdd(true)} className="px-4 py-2 rounded-full border-2 text-sm font-bold" style={{ borderColor: BLUE, color: BLUE }}>➕ Add your own item</button>
        ) : (
          <div className="bg-white rounded-xl shadow p-4 space-y-2">
            <input value={newItem.item} onChange={e=>setNewItem({...newItem, item:e.target.value})} placeholder="Item name" className="w-full border rounded p-2 text-sm" />
            <div className="flex gap-2 items-center text-sm flex-wrap">
              <select value={newItem.category} onChange={e=>setNewItem({...newItem, category:e.target.value})} className="border rounded p-1">
                <option value="essential">Essential</option><option value="recommended">Recommended</option><option value="optional">Optional</option>
              </select>
              <label>Weight (kg)</label>
              <input type="number" step="0.1" value={newItem.weight} onChange={e=>setNewItem({...newItem, weight:e.target.value})} className="border rounded p-1 w-20" />
              <input value={newItem.emoji} onChange={e=>setNewItem({...newItem, emoji:e.target.value})} className="border rounded p-1 w-12 text-center" />
            </div>
            <div className="flex gap-2">

const DEFAULT_BUDGET_ITEMS = [
  { id:'fuel',       label:'Petrol subsidy for drivers getting us there and back',         amount:'' },
  { id:'food',       label:'Food — all meals and snacks for the trip',                      amount:'' },
  { id:'gas',        label:'Gas canister for cooking stove',                                amount:'' },
  { id:'emerg_meal', label:'Backup emergency meal (e.g. 2-minute noodles)',                amount:'' },
  { id:'campsite',   label:'Campsite or camping area fees',                                 amount:'' },
  { id:'park_entry', label:'National park or reserve entry fee (check — Namadgi is free)', amount:'' },
  { id:'comms',      label:'Satellite messenger running cost (if used on your activity)',   amount:'' },
  { id:'water_purif',label:'Water purification tablets or filter replacement',              amount:'' },
  { id:'hire',       label:'Equipment hire (boats, ropes, packs, helmets etc.)',           amount:'' },
  { id:'other',      label:'Any other costs specific to this activity',                    amount:'' },
];

function BudgetPlanningSection({ sectionData, onChange, plan }){
  const numScouts = parseInt((plan.sections.participants && plan.sections.participants.p1_youthCount) || 0) || 0;

  const [items, setItems] = React.useState(() => {
    if(sectionData.items && sectionData.items.length) return sectionData.items;
    return DEFAULT_BUDGET_ITEMS.map(i => ({ ...i }));
  });
  const [newLabel, setNewLabel] = React.useState('');

  function saveToParent(newItems){
    const total = newItems.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
    const contingency = Math.round(total * 0.10 * 100) / 100;
    const grandTotal = Math.round((total + contingency) * 100) / 100;
    const perScout = numScouts > 0 ? Math.ceil(grandTotal / numScouts / 5) * 5 : 0;
    onChange({ items: newItems, subtotal: total, contingency, grandTotal, perScout });
  }

  function setAmount(id, val){
    const next = items.map(i => i.id === id ? { ...i, amount: val } : i);
    setItems(next);
    saveToParent(next);
  }
  function setLabel(id, val){
    setItems(items.map(i => i.id === id ? { ...i, label: val } : i));
  }
  function saveLabel(id){
    saveToParent(items);
  }
  function removeItem(id){
    const next = items.filter(i => i.id !== id);
    setItems(next);
    saveToParent(next);
  }
  function addItem(){
    if(!newLabel.trim()) return;
    const next = [...items, { id:'custom-'+Date.now(), label:newLabel, amount:'' }];
    setItems(next);
    setNewLabel('');
    saveToParent(next);
  }

  const subtotal = items.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const contingency = Math.round(subtotal * 0.10 * 100) / 100;
  const grandTotal = Math.round((subtotal + contingency) * 100) / 100;
  const perScout = numScouts > 0 ? Math.ceil(grandTotal / numScouts / 5) * 5 : null;

  return (
    <div>
      <div className="rounded-xl p-3 mb-4 text-sm" style={{ backgroundColor:'#e0f2fe' }}>
        💡 Fill in the dollar amount for each cost that applies to your activity. Delete any lines that don't apply. Add extra lines if you need to. Leave items at $0 if you're not sure — you can come back and update them.
      </div>

      <div className="space-y-2 mb-4">
        {items.map(item => (
          <div key={item.id} className="bg-white rounded-xl shadow-sm p-3 flex items-center gap-2">
            <div className="flex-1 min-w-0">
              <input
                value={item.label}
                onChange={e => setLabel(item.id, e.target.value)}
                onBlur={() => saveLabel(item.id)}
                className="w-full text-sm font-medium border-0 p-0 focus:outline-none bg-transparent"
                style={{ color: PURPLE }}
              />
            </div>
            <div className="flex items-center gap-1 flex-shrink-0">
              <span className="text-sm text-gray-500">$</span>
              <input
                type="number"
                min="0"
                step="1"
                value={item.amount}
                onChange={e => setAmount(item.id, e.target.value)}
                placeholder="0"
                className="w-20 border rounded p-1 text-sm text-right"
              />
            </div>
            <button onClick={() => removeItem(item.id)}
              className="text-gray-300 hover:text-red-400 font-bold flex-shrink-0 px-1">✕</button>
          </div>
        ))}
      </div>

      <div className="flex gap-2 mb-6">
        <input value={newLabel} onChange={e => setNewLabel(e.target.value)}
          placeholder="Add another cost item..."
          className="flex-1 border rounded-lg p-2 text-sm"
          onKeyDown={e => e.key==='Enter' && addItem()} />
        <button onClick={addItem}
          className="px-4 py-2 rounded-lg font-bold text-sm"
          style={{ backgroundColor: GOLD, color:'#000' }}>+ Add</button>
      </div>

      <div className="bg-white rounded-xl shadow p-4 mb-4">
        <div className="font-bold mb-3" style={{ color: PURPLE }}>💰 Budget Summary</div>
        <div className="space-y-2 text-sm">
          <div className="flex justify-between border-b pb-2">
            <span className="text-gray-600">Subtotal</span>
            <span className="font-bold">${subtotal.toFixed(2)}</span>
          </div>
          <div className="flex justify-between border-b pb-2">
            <span className="text-gray-600">Contingency (10% buffer — in case prices go up)</span>
            <span className="font-bold">${contingency.toFixed(2)}</span>
          </div>
          <div className="flex justify-between text-base font-bold pt-1">
            <span>Total estimated cost</span>
            <span style={{ color: PURPLE }}>${grandTotal.toFixed(2)}</span>
          </div>
          {numScouts > 0 ? (
            <div className="flex justify-between pt-2 border-t mt-2">
              <span className="text-gray-600">Estimated cost per scout ({numScouts} scouts — rounded up to nearest $5)</span>
              <span className="font-bold text-lg" style={{ color: BLUE }}>${perScout}</span>
            </div>
          ) : (
            <div className="text-xs text-gray-400 pt-2 border-t mt-2">Fill in the number of scouts in Section 2 (Participants) to see the per-person cost.</div>
          )}
        </div>
      </div>

      <div className="rounded-xl p-4" style={{ backgroundColor:'#fef3c7' }}>
        <div className="font-bold text-sm mb-1" style={{ color:'#92400e' }}>📋 Remember</div>
        <ul className="text-sm text-gray-700 space-y-1">
          <li className="flex gap-2"><span>•</span><span>This is an <b>estimate</b> — get your leader to check the numbers before you commit to anything.</span></li>
          <li className="flex gap-2"><span>•</span><span>Once your plan and menu are approved, you'll build a detailed <b>shopping list</b> to work within this budget.</span></li>
          <li className="flex gap-2"><span>•</span><span>Don't collect any money from scouts or buy anything until your leader has approved the plan.</span></li>
        </ul>
      </div>
    </div>
  );
}

/* ============================================================
   13. WIZARD QUESTION (single question renderer)
   ============================================================ */
function WizardQuestion({ field, value, onChange, plan }){
  const [localVal, setLocalVal] = React.useState(value || '');
  React.useEffect(() => { setLocalVal(value || ''); }, [field.id]);

  if(field.type === 'display'){
    const at = ACTIVITY_TYPES.find(a => a.type === plan.activityType);
    return (
      <div className="mb-4">
        <label className="block font-bold mb-1" style={{ color: PURPLE }}>{field.label}</label>
        <div className="inline-flex items-center gap-2 px-3 py-2 rounded-lg" style={{ backgroundColor:'#e0f2fe' }}>
          <span className="text-xl">{at?at.emoji:''}</span><span className="font-bold">{at?at.label:plan.activityType}</span>
        </div>
      </div>
    );
  }

  const inputClass = "w-full border rounded-lg p-2 focus:outline-none focus:ring-2";

  let fieldJsx = null;
  switch(field.type){
    case 'text':
      fieldJsx = <input type="text" value={localVal} placeholder={field.placeholder||''}
        onChange={e=>setLocalVal(e.target.value)}
        onBlur={e=>onChange(e.target.value)} className={inputClass} />;
      break;
    case 'number':
      fieldJsx = <input type="number" value={localVal} placeholder={field.placeholder||''}
        onChange={e=>setLocalVal(e.target.value)}
        onBlur={e=>onChange(e.target.value)} className={inputClass} />;
      break;
    case 'date':
      fieldJsx = <input type="date" value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass} />;
      break;
    case 'time':
      fieldJsx = <input type="time" value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass} />;
      break;
    case 'textarea':
      fieldJsx = <textarea rows={4} value={localVal} placeholder={field.placeholder||''}
        onChange={e=>setLocalVal(e.target.value)}
        onBlur={e=>onChange(e.target.value)} className={inputClass} />;
      break;
    case 'select':
      fieldJsx = (
        <select value={value||''} onChange={e=>onChange(e.target.value)} className={inputClass}>
          <option value="">— Choose —</option>
          {field.options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      );
      break;
    case 'yesno':
      fieldJsx = (
        <div className="flex gap-3">
          {['Yes','No'].map(o => (
            <button key={o} onClick={()=>onChange(o)} type="button"
              className="px-6 py-2 rounded-full font-bold border-2"
              style={{ borderColor: value===o?BLUE:'#e5e7eb', backgroundColor: value===o?BLUE:'#fff', color: value===o?'#fff':'#000' }}>
              {o==='Yes'?'✅ Yes':'❌ No'}
            </button>
          ))}
        </div>
      );
      break;
    case 'yesno+textarea': {
      const v = value || {};
      fieldJsx = (
        <div>
          <div className="flex gap-3 mb-2">
            {['Yes','No'].map(o => (
              <button key={o} onClick={()=>onChange({...v, answer:o})} type="button"
                className="px-6 py-2 rounded-full font-bold border-2"
                style={{ borderColor: v.answer===o?BLUE:'#e5e7eb', backgroundColor: v.answer===o?BLUE:'#fff', color: v.answer===o?'#fff':'#000' }}>
                {o==='Yes'?'✅ Yes':'❌ No'}
              </button>
            ))}
          </div>
          {v.answer === 'Yes' && (
            <textarea rows={3} defaultValue={v.details||''} placeholder="Which permits or bookings? Add details here."
              onBlur={e=>onChange({...v, details:e.target.value})} className={inputClass} />
          )}
        </div>
      );
      break;
    }
    case 'checkboxes': {
      const arr = Array.isArray(value) ? value : [];
      fieldJsx = (
        <div className="flex flex-wrap gap-2">
          {field.options.map(o => {
            const on = arr.includes(o);
            return (
              <button key={o} type="button"
                onClick={()=>onChange(on ? arr.filter(x=>x!==o) : [...arr, o])}
                className="px-3 py-2 rounded-full text-sm border-2 font-bold"
                style={{ borderColor: on?BLUE:'#e5e7eb', backgroundColor: on?'#e0f2fe':'#fff' }}>
                {on?'☑️ ':'⬜ '}{o}
              </button>
            );
          })}
        </div>
      );
      break;
    }
    case 'info_box':
      fieldJsx = (
        <div className="rounded-lg p-3 text-sm flex gap-2" style={{ backgroundColor:'#fef3c7' }}>
          <span>{field.content}</span>
        </div>
      );
      break;
    default:
      fieldJsx = null;
  }

  return (
    <div className="mb-5">
      <label className="block font-bold mb-2" style={{ color: PURPLE }}>
        {field.label} {field.required && <span style={{ color:'#dc2626' }}>*</span>}
      </label>
      {fieldJsx}
      {field.hint && (
        <div className="mt-2 text-sm rounded-lg p-2 flex gap-2" style={{ backgroundColor:'#fef3c7' }}>
          <span>💡</span><span>{field.hint}</span>
        </div>
      )}
    </div>
  );
}

   14. WIZARD
   ============================================================ */
function completedDot(plan, section){
  if(section.id === 'review') return false;
  return sectionHasContent(plan, section.id);
}

function Wizard({ plan, setPlan, onExit, onExport }){
  const [stepIdx, setStepIdx] = useState(0);
  const section = WIZARD_SECTIONS[stepIdx];

  function finalisePlan(p){
    const { completed, percent } = computePercent(p);
    const ai = p.sections.activityInfo || {};
    return { ...p, title: ai.s1_name || p.title, activityDate: ai.s1_dates || p.activityDate,
      completedSections: completed, percentComplete: percent, updatedAt: new Date().toISOString() };
  }

  function updateField(sectionId, fieldId, value){
    setPlan(prev => finalisePlan({ ...prev, sections: { ...prev.sections, [sectionId]: { ...prev.sections[sectionId], [fieldId]: value } } }));
  }
  function updateSceneSection(sectionId, data){
    setPlan(prev => finalisePlan({ ...prev, sections: { ...prev.sections, [sectionId]: { ...prev.sections[sectionId], ...data } } }));
  }

  const isLast = stepIdx === WIZARD_SECTIONS.length - 1;
  function next(){ if(!isLast) setStepIdx(stepIdx+1); }
  function prev(){ if(stepIdx>0) setStepIdx(stepIdx-1); else onExit(); }

  return (
    <div className="max-w-3xl mx-auto px-4 py-6 pb-24">
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <button onClick={onExit} className="text-sm" style={{ color: PURPLE }}>💾 Save &amp; exit</button>
          <span className="text-sm text-gray-500">Section {section.number} of {WIZARD_SECTIONS.length}</span>
        </div>
        <div className="w-full bg-gray-200 rounded-full h-2">
          <div className="h-2 rounded-full" style={{ width: ((stepIdx+1)/WIZARD_SECTIONS.length*100)+'%', backgroundColor: BLUE }}></div>
        </div>
        <div className="overflow-x-auto scrollx mt-2">
          <div className="flex gap-1">
            {WIZARD_SECTIONS.map((s,i) => (
              <button key={s.id} onClick={()=>setStepIdx(i)} title={s.label}
                className="flex-shrink-0 w-7 h-7 rounded-full text-xs font-bold border-2"
                style={{ borderColor: i===stepIdx?BLUE:'#e5e7eb',
                  backgroundColor: completedDot(plan,s)?'#16a34a': (i===stepIdx?BLUE:'#fff'),
                  color: (completedDot(plan,s)||i===stepIdx)?'#fff':'#9ca3af' }}>
                {s.number}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="rounded-xl p-4 mb-4 text-white" style={{ background: HEADER_GRAD }}>
        <div className="text-xs opacity-80">Section {section.number}</div>
        <h2 className="text-xl font-bold">{section.label}</h2>
        <p className="text-sm opacity-90 mt-1">{section.intro}</p>
        {section.id === 'activityInfo' && (
          <div className="mt-3 pt-3 border-t border-white border-opacity-30">
            <a href="https://nsw.scouts.com.au/adventurous-activities/plan-activity/" target="_blank" rel="noopener noreferrer"
              className="inline-flex items-start gap-2 text-sm px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-20 transition"
              style={{ color: '#fff', textDecoration: 'none' }}>
              🧭 Before you start: check "What Activities Can I Run?" on the Scouts NSW Plan an Activity page. It tells you what OAS stage you need to be and what qualifications your supervising leader needs for this type of activity.
            </a>
          </div>
        )}
        {section.id === 'activityInfo' && (() => {
          const dur = activityDurationDays(plan);
          if(dur === -1) return (
            <div className="mt-2 rounded-lg px-3 py-2 text-sm font-bold" style={{ backgroundColor:'#fee2e2', color:'#991b1b' }}>
              ⚠️ Your finish date is before your start date — check your dates!
            </div>
          );
          if(dur > 1) return (
            <div className="mt-2 rounded-lg px-3 py-2 text-sm" style={{ backgroundColor:'rgba(255,255,255,0.15)' }}>
              🗓️ This is a <b>{dur}-day activity</b> ({dur-1} night{dur-1 === 1 ? '' : 's'}) — the tool will remind you about meals, overnight gear and camp arrangements for every day.
            </div>
          );
          return null;
        })()}
        {section.id === 'menuWater' && (() => {
          const dur = activityDurationDays(plan);
          if(dur && dur > 1) return (
            <div className="mt-3 pt-3 border-t border-white border-opacity-30 text-sm">
              🗓️ Your activity runs <b>{dur} days ({dur-1} night{dur-1 === 1 ? '' : 's'})</b> — plan every breakfast, lunch and dinner for every day, plus snacks and one backup emergency meal.
            </div>
          );
          return (
            <div className="mt-3 pt-3 border-t border-white border-opacity-30 text-sm">
              ☀️ Single-day activity — you probably just need lunch, snacks and plenty of water. Still plan a backup snack in case you're out longer than expected!
            </div>
          );
        })()}
        {section.id === 'equipment' && (() => {
          const dur = activityDurationDays(plan);
          if(dur && dur > 1) return (
            <div className="mt-3 pt-3 border-t border-white border-opacity-30 text-sm">
              🌙 Overnight trip — don't forget sleeping gear: tent, sleeping bag, mat and warm layers for {dur-1} night{dur-1 === 1 ? '' : 's'} out.
            </div>
          );
          return null;
        })()}
        {section.id === 'location' && (
          <div className="mt-3 pt-3 border-t border-white border-opacity-30">
            <a href="https://topo-route.mtbdeligt.workers.dev/" target="_blank" rel="noopener noreferrer"
              className="inline-flex items-start gap-2 text-sm px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-20 transition"
              style={{ color: '#fff', textDecoration: 'none' }}>
              🗺️ Need to plan your route? Use the NSW Topo Tools Route Card builder to map your hike and print a route card.
            </a>
          </div>
        )}
      </div>

      <div>
        {section.fields.map(f => {
          if(f.type === 'scene'){
            return <RiskSceneSection key={f.id} activityType={plan.activityType}
              sectionData={plan.sections.safety || {}}
              onChange={data => updateSceneSection('safety', data)} />;
          }
          if(f.type === 'budget_scene'){
            return <BudgetPlanningSection key={f.id}
              sectionData={plan.sections.budget || {}} plan={plan}
              onChange={data => updateSceneSection('budget', data)} />;
          }
          if(f.type === 'equipment_scene'){
            return <EquipmentRoomSection key={f.id} activityType={plan.activityType}
              sectionData={plan.sections.equipment || {}} plan={plan}
              onChange={data => updateSceneSection('equipment', data)} />;
          }
          if(f.type === 'review_summary'){
            return <ReviewSummarySection key={f.id} plan={plan}
              onExport={() => onExport(plan)} />;
          }
          const v = (plan.sections[section.id] || {})[f.id];
          return <WizardQuestion key={f.id} field={f} value={v} plan={plan}
            onChange={val => updateField(section.id, f.id, val)} />;
        })}
      </div>

      <div className="flex justify-between mt-6">
        <button onClick={prev} className="px-5 py-2 rounded-full border-2 font-bold" style={{ borderColor: PURPLE, color: PURPLE }}>
          {stepIdx===0 ? '← Exit' : '← Back'}
        </button>
        {!isLast ? (
          <button onClick={next} className="px-6 py-2 rounded-full" style={{ backgroundColor: GOLD, color:'#000', fontWeight:'bold' }}>
            Next →
          </button>
        ) : (
          <button onClick={onExit} className="px-6 py-2 rounded-full text-white font-bold" style={{ backgroundColor: BLUE }}>
            Finish
          </button>
        )}
      </div>
    </div>
  );
}

const HEADER_WARNING = "⚠️ UNCONTROLLED IF PRINTED — CHECK nsw.scouts.com.au FOR CURRENT VERSION";
function dx(){ return window.docx; }

function makeHeaderFooter(filename){
  const { Header, Footer, Paragraph, TextRun, AlignmentType } = dx();
  return {
    headers: { default: new Header({ children: [ new Paragraph({ alignment: AlignmentType.CENTER,
      children: [ new TextRun({ text: HEADER_WARNING, bold:true, color:"B45309", size:18 }) ] }) ] }) },
    footers: { default: new Footer({ children: [ new Paragraph({ alignment: AlignmentType.CENTER,
      children: [ new TextRun({ text: filename + " · Generated by 1st Jerra Scout Planner " + todayStr(), size:16, color:"888888" }) ] }) ] }) }
  };
}

function titleBlock(docType, plan){
  const { Paragraph, TextRun } = dx();
  return [
    new Paragraph({ children:[ new TextRun({ text:"1st Jerrabomberra Scout Group — " + docType, bold:true, size:56, color:"6B2D8B" }) ] }),
    new Paragraph({ children:[ new TextRun({ text:(plan.title||'Untitled') + "  ·  " + formatDate(plan.activityDate), italics:true, size:24 }) ] }),
    new Paragraph({ text:"" })
  ];
}

function shadedCell(text, { bold, shade, width } = {}){
  const { TableCell, Paragraph, TextRun, WidthType } = dx();
  return new TableCell({
    width: width ? { size: width, type: WidthType.PERCENTAGE } : undefined,
    shading: shade ? { fill: shade } : undefined,
    children: [ new Paragraph({ children:[ new TextRun({ text: String(text==null?'':text), bold: !!bold, color: shade==="6B2D8B" ? "FFFFFF" : "000000" }) ] }) ]
  });
}

function buildTable(rows, headerRow){
  const { Table, TableRow, WidthType, BorderStyle } = dx();
  const border = { style: BorderStyle.SINGLE, size:1, color:"CCCCCC" };
  const borders = { top:border, bottom:border, left:border, right:border, insideHorizontal:border, insideVertical:border };
  const trs = [];
  if(headerRow){
    trs.push(new TableRow({ tableHeader:true, children: headerRow.map(h => shadedCell(h, { bold:true, shade:"6B2D8B" })) }));
  }
  rows.forEach((r, i) => {
    const shade = i % 2 === 1 ? "F3F4F6" : "FFFFFF";
    trs.push(new TableRow({ children: r.map((c, ci) => shadedCell(c, { bold: !headerRow && ci===0, shade })) }));
  });
  return new Table({ width:{ size:100, type:WidthType.PERCENTAGE }, borders, rows: trs });
}

function downloadDoc(doc, filename){
  return dx().Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  });
}

function generateActivityPlan(plan){
  const { Document } = dx();
  const s = plan.sections;
  const get = (sec, f) => (s[sec] && s[sec][f]) || '';
  const equip = (s.equipment && s.equipment.selectedItems || []).map(i=>i.item).join(', ');
  const rows = [
    ["Activity title", plan.title || ''],

    ["Dates", get('activityInfo','s1_dateEnd') && get('activityInfo','s1_dateEnd') !== get('activityInfo','s1_dates')
      ? formatDate(get('activityInfo','s1_dates')) + " to " + formatDate(get('activityInfo','s1_dateEnd'))
      : formatDate(plan.activityDate)],
    ["Location", get('location','l1_name')],

function riskShadeColor(level){
  if(level === 'HIGH') return 'FF0000';
  if(level === 'MEDIUM') return 'FFC000';
  if(level === 'LOW') return '00B050';
  return 'FFFFFF';
}

function generateRiskAssessment(plan){
  const { Document, Table, TableRow, TableCell, Paragraph, TextRun, WidthType, BorderStyle } = dx();
  const hazards = (plan.sections.safety && plan.sections.safety.hazards) || [];
  const overallRisk = (plan.sections.safety && plan.sections.safety.overallRisk) || 'Not assessed';

  const border = { style: BorderStyle.SINGLE, size:1, color:"CCCCCC" };
  const borders = { top:border, bottom:border, left:border, right:border, insideHorizontal:border, insideVertical:border };

  function riskCell(text, shade){
    return new TableCell({
      shading: { fill: shade },
      children: [ new Paragraph({ children:[ new TextRun({ text: String(text==null?'':text), bold: true, color: text==='HIGH'?'FFFFFF':'000000' }) ] }) ]
    });
  }

  function plainCell(text, shade){
    return new TableCell({
      shading: shade ? { fill: shade } : undefined,
      children: [ new Paragraph({ children:[ new TextRun({ text: String(text==null?'':text) }) ] }) ]
    });
  }

  const trs = [];
  // Header row
  trs.push(new TableRow({ tableHeader:true, children: ["Hazard","Zone","Initial Risk","Controls","Residual Risk"].map(h => shadedCell(h, { bold:true, shade:"6B2D8B" })) }));

  // Overall risk row
  const overallShade = riskShadeColor(overallRisk);
  trs.push(new TableRow({ children: [
    new TableCell({ columnSpan:4, shading:{ fill:"E0E0E0" }, children:[new Paragraph({ children:[new TextRun({ text:"Overall Residual Risk Rating", bold:true })] })] }),
    riskCell(overallRisk, overallShade)
  ]}));

  if(hazards.length === 0){
    trs.push(new TableRow({ children: [plainCell("No hazards recorded","FFFFFF"), plainCell("","FFFFFF"), plainCell("","FFFFFF"), plainCell("","FFFFFF"), plainCell("","FFFFFF")] }));
  } else {
    hazards.forEach((h, i) => {
      const rowShade = i % 2 === 1 ? "F3F4F6" : "FFFFFF";
      const initShade = riskShadeColor(h.initial_risk || '');
      const residShade = riskShadeColor(h.residual_risk || '');
      trs.push(new TableRow({ children: [
        plainCell(h.hazard, rowShade),
        plainCell(h.zone || '', rowShade),
        riskCell(h.initial_risk || '', initShade),
        plainCell(Array.isArray(h.controls) ? h.controls.join('; ') : (h.controls || ''), rowShade),
        riskCell(h.residual_risk || '', residShade)
      ]}));
    });
  }

  const fn = "Risk_Assessment.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn),
    children:[ ...titleBlock("Risk Assessment", plan),
      new Table({ width:{ size:100, type:WidthType.PERCENTAGE }, borders, rows: trs }) ] }] });
  return downloadDoc(doc, fn);
}

function generateEmergencyPlan(plan){
  const { Document, Paragraph, TextRun } = dx();
  const s = plan.sections;
  const get = (sec,f) => (s[sec] && s[sec][f]) || '';
  let steps = (get('emergencyPlan','e3_steps') || '').split('\n').filter(x=>x.trim());
  const devices = get('emergencyPlan','e5_commsDevices');
  const children = [ ...titleBlock("Emergency Action Plan", plan) ];
  children.push(new Paragraph({ children:[ new TextRun({ text:"Emergency action steps", bold:true, size:26, color:"6B2D8B" }) ] }));
  if(steps.length === 0) steps = ["Make scene safe", "Call 000", "Provide first aid", "Contact emergency home contact", "Contact leader"];
  steps.forEach((st,i) => children.push(new Paragraph({ children:[ new TextRun({ text:(i+1)+". "+st }) ] })));
  children.push(new Paragraph({ text:"" }));
  const rows = [
    ["Nearest hospital", get('emergencyPlan','e1_hospital')],
    ["Nearest police", get('emergencyPlan','e2_police')],
    ["Emergency home contact", get('timing','t4_emergContact')],

  children.push(buildTable(rows));
  const fn = "Emergency_Action_Plan.docx";
  const doc = new Document({ sections:[{ ...makeHeaderFooter(fn), children }] });

}

function loadDocx(cb){
  if(window.docx) return cb();
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js';
  s.onload = cb;
  s.onerror = () => alert("Could not load document library. Please check your internet connection.");
  document.head.appendChild(s);
}

function generateAllDocs(plan){
  loadDocx(() => {
  generateActivityPlan(plan)
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateRiskAssessment(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateEmergencyPlan(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generatePackingList(plan))
    .then(()=> new Promise(r=>setTimeout(r,600)))
    .then(()=> generateMenuWater(plan))
    .catch(err => { console.error(err); alert("Something went wrong generating documents: " + err.message); });
  });
}

   Build a fresh plan, optionally seeded from a library template

function emptySections(){
  return { activityInfo:{}, participants:{}, supervision:{}, location:{}, timing:{}, safety:{},
    emergencyPlan:{}, equipment:{}, menuWater:{}, budget:{}, transport:{}, comms:{}, leadership:{}, environment:{}, review:{} };
}

function newPlan(type){
  const now = new Date().toISOString();
  const sections = emptySections();
  sections.activityInfo.s1_group = "1st Jerrabomberra Scout Group";
  return { id: generateId(), activityType: type, title:'', createdAt: now, updatedAt: now,
    activityDate:'', sections, completedSections:[], percentComplete:0, status:'draft' };
}

function planFromTemplate(act){
  const now = new Date().toISOString();
  const sections = emptySections();
  const ai = sections.activityInfo;
  ai.s1_name = act.title; ai.s1_group = "1st Jerrabomberra Scout Group";
  // Deliberately do NOT copy the old trip's date or season — the scout enters
  // their own date and the season is derived from it (Australian seasons).
  ai.s1_dates = '';
  if(act.location){
    sections.location.l1_name = act.location.name || '';
    sections.location.l2_start = act.location.start_point || '';
    sections.location.l3_finish = act.location.finish_point || '';
    sections.location.l5_tenure = act.location.park || act.location.tenure || '';
    sections.location.l7_safeHavens = (act.safe_havens||[]).join('\n');
  }
  if(act.participants){
    sections.participants.p1_youthCount = act.participants.youth_count;
    sections.participants.p4_leaderCount = act.participants.leader_count;
    sections.participants.p2_oasStage = act.oas_stage;
  }
  sections.supervision.sv1_type = (act.supervision||'').toLowerCase().includes('indirect') ?
    "Indirect — leader nearby but you work independently" : "Direct — leader right beside you";
  if(act.comms){ sections.comms.c1_primary = act.comms.primary || ''; sections.comms.c2_alternate = act.comms.alternate || ''; }
  if(act.menu){ sections.menuWater.m1_meals = act.menu.meals || ''; sections.menuWater.m2_water = act.menu.water_plan || ''; }
  sections.emergencyPlan.e1_hospital = act.hospital || '';
  sections.emergencyPlan.e4_cancel = (act.cancellation_triggers||[]).join(', ');

  const zones = ZONES[act.type] || ZONES.hike;
  const hazardState = {};
  (act.hazards||[]).forEach(h => {
    const hl = h.hazard.toLowerCase();
    let zone = zones[zones.length-1].label;
    for(const z of zones){ const kws = ZONE_KEYWORDS[z.label]||[]; if(kws.some(k=>hl.includes(k))){ zone = z.label; break; } }
    const key = zone + '|' + h.hazard;
    hazardState[key] = { hazard:h.hazard, zone, status:'yes', initial_risk:h.initial_risk||'MEDIUM',
      controls:(h.controls||[]).join('\n'), residual_risk:h.residual_risk||'LOW', libInitial:h.initial_risk };
  });
  sections.safety.hazardState = hazardState;
  sections.safety.hazards = Object.values(hazardState).map(h => ({ hazard:h.hazard, zone:h.zone, status:h.status,
    initial_risk:h.initial_risk, controls:h.controls, residual_risk:h.residual_risk }));

  const pl = LIBRARY_DATA.packing_lists[act.type] || [];
  sections.equipment.selectedItems = pl.filter(p=>p.category==='essential').map(p=>({ item:p.item, category:p.category, weight:p.weight, emoji:p.emoji, selected:true }));

  const base = { id: generateId(), activityType: act.type, title: act.title, createdAt: now, updatedAt: now,
    activityDate: '', sections, completedSections:[], percentComplete:0, status:'draft' };
  const { completed, percent } = computePercent(base);
  base.completedSections = completed; base.percentComplete = percent;
  return base;
}

            style={{ backgroundColor: PURPLE, color: '#fff', textDecoration: 'none' }}>
            Open NSW Topo Tools Route Card Builder ↗
          </a>
        </div>

        {/* Back button */}
        <button onClick={onBack}
          className="w-full py-3 rounded-2xl font-bold text-white text-lg"
          style={{ backgroundColor: PURPLE }}>
          ← Back to Home
        </button>

      </div>
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState('dashboard');
  const [plans, setPlans] = useState(() => loadPlans());
  const [currentPlan, setCurrentPlan] = useState(null);

  useEffect(() => { savePlans(plans); }, [plans]);

  function upsertPlan(updated){
    setPlans(prev => {
      const exists = prev.some(p => p.id === updated.id);
      return exists ? prev.map(p => p.id === updated.id ? updated : p) : [updated, ...prev];
    });
  }

  function setWizardPlan(updater){
    setCurrentPlan(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      upsertPlan(next);
      return next;
    });
  }

  function startNew(type){
    const p = newPlan(type);
    setCurrentPlan(p); upsertPlan(p); setScreen('wizard');
  }
  function useTemplate(act){
    const p = planFromTemplate(act);
    setCurrentPlan(p); upsertPlan(p); setScreen('wizard');
  }
  function openPlan(p){ setCurrentPlan(p); setScreen('planDetail'); }
  function deletePlan(){
    setPlans(prev => prev.filter(p => p.id !== currentPlan.id));
    setCurrentPlan(null); setScreen('dashboard');
  }
  function approvePlan(){
    const updated = { ...currentPlan, status:'approved', updatedAt:new Date().toISOString() };
    setCurrentPlan(updated); upsertPlan(updated);
  }

  return (
    <div className="min-h-screen bg-gray-100 pb-12">
      <Header screen={screen}
        onHome={()=>setScreen('dashboard')}
        onLibrary={()=>setScreen('library')}
        onInstructions={()=>setScreen('instructions')} />

      {screen === 'dashboard' &&
        <Dashboard plans={plans} onNew={()=>setScreen('newPlan')} onOpen={openPlan} onDelete={(id) => setPlans(prev => prev.filter(p => p.id !== id))} />}

      {screen === 'newPlan' &&
        <NewPlan onPick={startNew} onCancel={()=>setScreen('dashboard')} />}

      {screen === 'wizard' && currentPlan &&
        <Wizard plan={currentPlan} setPlan={setWizardPlan}
          onExit={()=>setScreen('planDetail')} onExport={generateAllDocs} />}

      {screen === 'instructions' &&
        <InstructionsScreen onBack={()=>setScreen('dashboard')} />}

      {screen === 'library' &&
        <LibraryScreen onUseTemplate={useTemplate} />}

      {screen === 'planDetail' && currentPlan &&
        <PlanDetail plan={currentPlan}
          onEdit={()=>setScreen('wizard')}
          onExport={generateAllDocs}
          onDelete={deletePlan}
          onBack={()=>setScreen('dashboard')} />}

      <PolicyBanner />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
