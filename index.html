    /* ══════════════════════════════════════════════════════════════
       UTILITY FUNCTIONS
    ══════════════════════════════════════════════════════════════ */

    function generateId() {
      return 'plan-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
    }

    function loadPlans() {
      try { return JSON.parse(localStorage.getItem('jerra_plans') || '[]'); }
      catch { return []; }
    }

    function persistPlans(plans) {
      localStorage.setItem('jerra_plans', JSON.stringify(plans));
    }

    function createNewPlan(activityType) {
      const sections = {};
      WIZARD_SECTIONS.forEach(s => { sections[s.id] = {}; });
      return {
        id: generateId(),
        activityType,
        title: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        sections,
        completedSections: [],
        percentComplete: 0,
      };
    }

    function computePercent(plan) {
      return Math.round((plan.completedSections.length / WIZARD_SECTIONS.length) * 100);
    }

    function activityEmoji(type) {
      return ACTIVITY_TYPES.find(a => a.id === type)?.emoji || '📋';
    }

    function formatDate(iso) {
      if (!iso) return '';
      try {
        // Handle both YYYY-MM-DD and full ISO strings
        const d = new Date(iso.includes('T') ? iso : iso + 'T12:00:00');
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch { return iso; }
    }

    function riskColour(risk) {
      if (!risk) return 'bg-gray-200 text-gray-600';
      const r = risk.toUpperCase();
      if (r === 'LOW')    return 'bg-green-100 text-green-700';
      if (r === 'MEDIUM' || r === 'MODERATE') return 'bg-yellow-100 text-yellow-700';
      return 'bg-red-100 text-red-700';
    }

              {screen !== 'library' && (
                <button onClick={() => onNavigate('library')}
                  className="text-xs bg-white/10 hover:bg-white/25 px-2.5 py-1.5 rounded-full transition-colors">
                  📚 Library
                </button>
              )}
              {screen !== 'dashboard' && (
                <button onClick={() => onNavigate('dashboard')}
                  className="text-xs bg-white/10 hover:bg-white/25 px-2.5 py-1.5 rounded-full transition-colors">
                  🏠 Home
                </button>
              )}
            </div>
          </div>

          {/* Wizard progress strip */}
          {screen === 'wizard' && currentPlan && (
            <div className="border-t border-white/10 px-4 py-1.5">
              <div className="max-w-4xl mx-auto flex items-center gap-3">
                <span className="text-xs text-purple-200 flex-shrink-0 w-20 text-right">{pct}% done</span>
                <div className="flex-1 bg-white/20 rounded-full h-1.5">
                  <div className="bg-brand-gold h-1.5 rounded-full pbar" style={{ width: `${pct}%` }} />
                </div>
                <span className="text-xs text-purple-200 flex-shrink-0">
                  {currentPlan.completedSections.length}/{WIZARD_SECTIONS.length} sections
                </span>
              </div>
            </div>
          )}
        </header>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 1 — DASHBOARD
    ══════════════════════════════════════════════════════════════ */
    function Dashboard({ plans, onNavigate, onSelectPlan }) {
      const sorted = [...plans].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          {/* Hero banner */}
          <div className="hdr-gradient rounded-2xl p-6 mb-6 text-white shadow-lg">
            <h1 className="text-2xl font-bold mb-1">G'day, Scout! 👋</h1>
            <p className="text-purple-200 text-sm leading-relaxed">
              Plan your next adventure safely. Fill in all 14 sections to get your plan ready
              for leader approval. The Activity Library has real plans from 1st Jerra to inspire you.
            </p>
          </div>

          {/* CTA buttons */}
          <div className="grid grid-cols-2 gap-3 mb-8">
            <button
              onClick={() => onNavigate('newPlan')}
              className="gold-gradient text-black font-bold py-3 px-4 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2"
            >
              <span className="text-xl">+</span> New Plan
            </button>
            <button
              onClick={() => onNavigate('library')}
              className="bg-white border-2 text-brand-purple font-bold py-3 px-4 rounded-xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2"
              style={{ borderColor: '#6B2D8B', color: '#6B2D8B' }}
            >
              📚 Activity Library
            </button>
          </div>

          {/* Plans list */}
          <h2 className="text-lg font-bold text-gray-800 mb-3">
            Your Plans
            <span className="ml-2 text-sm font-normal text-gray-400">({plans.length})</span>
          </h2>

          {plans.length === 0 ? (
            /* Empty state */
            <div className="bg-white rounded-2xl p-10 text-center shadow-sm border border-gray-200">
              <div className="text-6xl mb-4">🗺️</div>
              <h3 className="text-xl font-bold text-gray-700 mb-2">No plans yet!</h3>
              <p className="text-gray-500 text-sm mb-5 max-w-xs mx-auto">
                Start your first activity plan. Your leaders will be impressed with your preparation!
              </p>
              <button
                onClick={() => onNavigate('newPlan')}
                className="gold-gradient text-black font-bold py-2.5 px-6 rounded-xl transition-all"
              >
                Plan my first adventure →
              </button>
            </div>
          ) : (
            <div className="grid gap-3 sm:grid-cols-2">
              {sorted.map(plan => (
                <PlanCard key={plan.id} plan={plan} onClick={() => onSelectPlan(plan)} />
              ))}
            </div>
          )}
        </div>
      );
    }

    function PlanCard({ plan, onClick }) {
      const pct = plan.percentComplete || 0;
      const date = plan.sections?.activityInfo?.date;
      return (
        <button
          onClick={onClick}
          className="bg-white rounded-2xl p-4 shadow-sm border border-gray-200 hover:border-purple-400 hover:shadow-md transition-all text-left w-full group"
        >
          <div className="flex gap-3 items-start">
            <div className="text-3xl mt-0.5">{activityEmoji(plan.activityType)}</div>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-gray-800 truncate group-hover:text-purple-700 transition-colors">
                {plan.title || 'Untitled Plan'}
              </div>
              <div className="text-xs text-gray-400 mt-0.5">
                {plan.activityType}
                {date ? ' • ' + formatDate(date) : ''}
                {' • updated '}{formatDate(plan.updatedAt)}
              </div>
              {/* Progress bar */}
              <div className="flex items-center gap-2 mt-2">
                <div className="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
                  <div
                    className="h-2 rounded-full pbar"
                    style={{
                      width: `${pct}%`,
                      backgroundColor: pct === 100 ? '#2D6A2D' : '#F5A800'
                    }}
                  />
                </div>
                <span className="text-xs font-bold" style={{ color: pct === 100 ? '#2D6A2D' : '#666' }}>
                  {pct}%
                </span>
              </div>
              <div className="text-xs text-gray-400 mt-1">
                {plan.completedSections.length} / {WIZARD_SECTIONS.length} sections complete
              </div>
            </div>
          </div>
        </button>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 2 — NEW PLAN / ACTIVITY SELECTOR
    ══════════════════════════════════════════════════════════════ */
    function NewPlan({ onSelectType }) {
      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          <h1 className="text-2xl font-bold text-gray-800 mb-1">Choose Activity Type</h1>
          <p className="text-gray-500 mb-6 text-sm">
            What kind of adventure are you planning? We'll tailor the questions for you.
          </p>

          <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
            {ACTIVITY_TYPES.map(type => (
              <button
                key={type.id}
                onClick={() => onSelectType(type.id)}
                className="rounded-2xl p-5 text-left border-2 hover:scale-105 hover:shadow-xl transition-all active:scale-100"
                style={{ backgroundColor: type.bg, borderColor: type.border }}
              >
                <div className="text-4xl mb-3">{type.emoji}</div>
                <div className="font-bold text-gray-800 text-lg">{type.label}</div>
                <div className="text-xs text-gray-600 mt-1 leading-relaxed">{type.desc}</div>
              </button>
            ))}
          </div>

          <div className="mt-6 bg-purple-50 border border-purple-200 rounded-xl p-4 text-sm text-purple-800">
            <strong>💡 Tip:</strong> Check the Activity Library first — you might find a similar past activity
            to use as a template and save heaps of time!
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 3 — GUIDED WIZARD  (14 sections × N questions)
    ══════════════════════════════════════════════════════════════ */
    function Wizard({ plan, onUpdatePlan, onNavigate }) {
      // Start at the first incomplete section (so resuming works)
      const firstIncomplete = WIZARD_SECTIONS.findIndex(s => !plan.completedSections.includes(s.id));
      const [secIdx, setSecIdx] = useState(firstIncomplete === -1 ? 0 : firstIncomplete);
      const [qIdx,   setQIdx]   = useState(0);

      // Local copy of sections so we don't write to parent on every keystroke
      const [localSections, setLocalSections] = useState(() =>
        JSON.parse(JSON.stringify(plan.sections))
      );

      const section       = WIZARD_SECTIONS[secIdx];
      const question      = section.fields[qIdx];
      const isLastQ       = qIdx   === section.fields.length - 1;
      const isLastSection = secIdx === WIZARD_SECTIONS.length - 1;

      const currentValue = localSections[section.id]?.[question.id] ?? '';

      function setValue(val) {
        setLocalSections(prev => ({
          ...prev,
          [section.id]: { ...prev[section.id], [question.id]: val }
        }));
      }

      // Flush local data + mark section complete → propagate to parent
      function flushAndAdvance() {
        const nowComplete = [...new Set([...plan.completedSections, section.id])];
        const updated = {
          ...plan,
          sections: localSections,
          completedSections: nowComplete,
          title: localSections.activityInfo?.title || plan.title || 'Untitled Plan',
          updatedAt: new Date().toISOString(),
        };
        updated.percentComplete = computePercent(updated);
        onUpdatePlan(updated);
        return updated;
      }

      // Just flush without marking section complete (e.g. sidebar nav)
      function flushSilent() {
        const updated = {
          ...plan,
          sections: localSections,
          title: localSections.activityInfo?.title || plan.title || 'Untitled Plan',
          updatedAt: new Date().toISOString(),
        };
        updated.percentComplete = computePercent(updated);
        onUpdatePlan(updated);
      }

      function goNext() {
        if (!isLastQ) {
          setQIdx(q => q + 1);
        } else {
          flushAndAdvance();
          if (isLastSection) {
            onNavigate('planDetail');
          } else {
            setSecIdx(s => s + 1);
            setQIdx(0);
          }
        }
      }

      function goBack() {
        if (qIdx > 0) {
          setQIdx(q => q - 1);
        } else if (secIdx > 0) {
          flushSilent();
          setSecIdx(s => s - 1);
          setQIdx(WIZARD_SECTIONS[secIdx - 1].fields.length - 1);
        }
      }

      function jumpToSection(i) {
        flushSilent();
        setSecIdx(i);
        setQIdx(0);
      }

      return (
        <div className="max-w-4xl mx-auto px-4 py-4">
          <div className="flex gap-4 items-start">

            {/* ── Sidebar (desktop) ── */}
            <aside className="hidden md:block w-48 flex-shrink-0">
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sticky top-24 max-h-[calc(100vh-8rem)] overflow-y-auto">
                <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2 px-1">Sections</p>
                {WIZARD_SECTIONS.map((s, i) => {
                  const done    = plan.completedSections.includes(s.id);
                  const current = i === secIdx;
                  return (
                    <button
                      key={s.id}
                      onClick={() => jumpToSection(i)}
                      className={`w-full text-left px-2 py-1.5 rounded-lg mb-0.5 flex items-center gap-2 transition-all text-xs
                        ${current ? 'text-white font-bold' : done ? 'text-green-700 hover:bg-green-50' : 'text-gray-500 hover:bg-gray-50'}`}
                      style={current ? { backgroundColor: '#6B2D8B' } : {}}
                    >
                      <span
                        className={`w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold
                          ${current ? 'bg-white' : done ? 'text-white' : 'bg-gray-200 text-gray-500'}`}
                        style={current ? { color: '#6B2D8B' } : done ? { backgroundColor: '#2D6A2D' } : {}}
                      >
                        {done && !current ? '✓' : s.number}
                      </span>
                      <span className="leading-tight">{s.label}</span>
                    </button>
                  );
                })}
              </div>
            </aside>

            {/* ── Main content ── */}
            <div className="flex-1 min-w-0 fade-in">

              {/* Section heading row */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-4">
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  <span className="text-xs font-bold text-white px-2 py-0.5 rounded-full" style={{ backgroundColor: '#6B2D8B' }}>
                    Section {section.number} of {WIZARD_SECTIONS.length}
                  </span>
                  <span className="text-xs text-gray-400">
                    Question {qIdx + 1} of {section.fields.length}
                  </span>
                  <span className="ml-auto text-xl">{activityEmoji(plan.activityType)}</span>
                </div>
                <h2 className="text-xl font-bold text-gray-800">{section.label}</h2>

                {/* Mobile dot-nav for sections */}
                <div className="md:hidden mt-3 flex flex-wrap gap-1">
                  {WIZARD_SECTIONS.map((s, i) => {
                    const done    = plan.completedSections.includes(s.id);
                    const current = i === secIdx;
                    return (
                      <button
                        key={s.id}
                        onClick={() => jumpToSection(i)}
                        className="w-6 h-6 rounded-full text-xs font-bold flex items-center justify-center transition-all"
                        style={{
                          backgroundColor: current ? '#6B2D8B' : done ? '#2D6A2D' : '#e5e7eb',
                          color: (current || done) ? 'white' : '#6b7280'
                        }}
                      >
                        {done && !current ? '✓' : s.number}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Question card + tip panel */}
              <div className="flex gap-4 flex-col lg:flex-row">

                {/* Question card */}
                <div className="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 p-5 fade-in" key={`${secIdx}-${qIdx}`}>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    {question.label}
                    {question.required && <span className="text-red-500 ml-1">*</span>}
                  </label>

                  {question.type === 'textarea' ? (
                    <textarea
                      value={currentValue}
                      onChange={e => setValue(e.target.value)}
                      placeholder={question.placeholder}
                      rows={5}
                      className="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 resize-none"
                      style={{ focusRingColor: '#6B2D8B' }}
                      onFocus={e => e.target.style.borderColor = '#6B2D8B'}
                      onBlur={e => e.target.style.borderColor = '#d1d5db'}
                    />
                  ) : question.type === 'select' ? (
                    <select
                      value={currentValue}
                      onChange={e => setValue(e.target.value)}
                      className="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 bg-white"
                      onFocus={e => e.target.style.borderColor = '#6B2D8B'}
                      onBlur={e => e.target.style.borderColor = '#d1d5db'}
                    >
                      {question.options.map(opt => (
                        <option key={opt} value={opt}>{opt || '— Select —'}</option>
                      ))}
                    </select>
                  ) : (
                    <input
                      type={question.type}
                      value={currentValue}
                      onChange={e => setValue(e.target.value)}
                      placeholder={question.placeholder}
                      onKeyDown={e => e.key === 'Enter' && !e.shiftKey && goNext()}
                      className="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2"
                      onFocus={e => e.target.style.borderColor = '#6B2D8B'}
                      onBlur={e => e.target.style.borderColor = '#d1d5db'}
                    />
                  )}

                  {/* In-section dot progress + nav */}
                  <div className="flex items-center justify-between mt-5 gap-3">
                    <button
                      onClick={goBack}
                      disabled={secIdx === 0 && qIdx === 0}
                      className="px-4 py-2 text-sm border border-gray-300 rounded-xl hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                    >
                      ← Back
                    </button>

                    {/* Dots for questions in this section */}
                    <div className="flex gap-1.5 items-center">
                      {section.fields.map((_, i) => (
                        <div
                          key={i}
                          className="rounded-full transition-all"
                          style={{
                            width:  i === qIdx ? '8px' : '6px',
                            height: i === qIdx ? '8px' : '6px',
                            backgroundColor: i < qIdx ? '#2D6A2D' : i === qIdx ? '#6B2D8B' : '#d1d5db'
                          }}
                        />
                      ))}
                    </div>

                    <button
                      onClick={goNext}
                      className="px-4 py-2 text-sm font-bold rounded-xl text-white transition-colors"
                      style={{ backgroundColor: isLastQ ? (isLastSection ? '#2D6A2D' : '#2D6A2D') : '#6B2D8B' }}
                    >
                      {isLastQ
                        ? (isLastSection ? '✓ Finish Plan' : 'Save & Continue →')
                        : 'Next →'}
                    </button>
                  </div>
                </div>

                {/* Tip panel */}
                <aside className="lg:w-60 xl:w-64 tip-gradient text-white rounded-2xl p-4 self-start">
                  <p className="font-bold text-sm mb-2 flex items-center gap-1.5">
                    <span>💡</span> Planner Tip
                  </p>
                  <p className="text-purple-100 text-xs leading-relaxed">{section.tip}</p>
                  <div className="mt-4 bg-white/10 rounded-xl p-3">
                    <p className="text-xs text-purple-200 mb-1">Your activity</p>
                    <div className="flex items-center gap-2">
                      <span className="text-2xl">{activityEmoji(plan.activityType)}</span>
                      <span className="font-bold capitalize text-sm">{plan.activityType}</span>
                    </div>
                  </div>
                </aside>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 4 — ACTIVITY LIBRARY
    ══════════════════════════════════════════════════════════════ */
    function Library({ onUseTemplate }) {
      const [filter,   setFilter]   = useState('all');
      const [selected, setSelected] = useState(null);

      const activities = LIBRARY_DATA.activities;
      const types      = [...new Set(activities.map(a => a.type))];
      const filtered   = filter === 'all' ? activities : activities.filter(a => a.type === filter);

      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          <h1 className="text-2xl font-bold text-gray-800 mb-1">Activity Library</h1>
          <p className="text-gray-500 text-sm mb-5">
            Real past activities from 1st Jerra — browse for inspiration or click "Use as Template" to pre-fill a new plan.
          </p>

          {/* Filter chips */}
          <div className="flex gap-2 flex-wrap mb-5">
            {['all', ...types].map(t => (
              <button
                key={t}
                onClick={() => setFilter(t)}
                className="px-3 py-1.5 rounded-full text-sm font-medium transition-colors border"
                style={filter === t
                  ? { backgroundColor: '#6B2D8B', color: 'white', borderColor: '#6B2D8B' }
                  : { backgroundColor: 'white', color: '#374151', borderColor: '#d1d5db' }
                }
              >
                {t === 'all' ? 'All activities' : `${activityEmoji(t)} ${t.charAt(0).toUpperCase() + t.slice(1)}`}
              </button>
            ))}
          </div>

          {/* Activity grid */}
          <div className="grid gap-3 sm:grid-cols-2">
            {filtered.map(act => (
              <button
                key={act.id}
                onClick={() => setSelected(act)}
                className="bg-white rounded-2xl p-4 shadow-sm border border-gray-200 hover:border-purple-400 hover:shadow-md transition-all text-left"
              >
                <div className="flex gap-3 items-start">
                  <div className="text-3xl">{activityEmoji(act.type)}</div>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-gray-800 text-sm leading-tight">{act.title}</p>
                    <p className="text-xs text-gray-400 mt-0.5">
                      {act.location?.name} {act.location?.region ? `• ${act.location.region}` : ''}
                    </p>
                    <div className="flex flex-wrap gap-1.5 mt-2">
                      <Chip>{act.type}</Chip>
                      {act.oas_stage && <Chip>OAS {act.oas_stage}</Chip>}
                      {act.location?.distance_km && <Chip>{act.location.distance_km} km</Chip>}
                      <Chip>{(act.hazards || []).length} hazards</Chip>
                    </div>
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* Detail modal */}
          {selected && (
            <LibraryModal
              activity={selected}
              onClose={() => setSelected(null)}
              onUseTemplate={() => { onUseTemplate(selected); setSelected(null); }}
            />
          )}
        </div>
      );
    }

    function Chip({ children }) {
      return (
        <span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">{children}</span>
      );
    }

    function LibraryModal({ activity, onClose, onUseTemplate }) {
      return (
        <div
          className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4"
          onClick={onClose}
        >
          <div
            className="bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl shadow-2xl modal-scroll overflow-y-auto max-h-[92vh] sm:max-h-[85vh]"
            onClick={e => e.stopPropagation()}
          >
            {/* Modal header */}
            <div className="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-start gap-3 rounded-t-2xl">
              <div className="text-3xl mt-0.5">{activityEmoji(activity.type)}</div>
              <div className="flex-1 min-w-0">
                <div className="flex gap-1.5 mb-1 flex-wrap">
                  <Chip>{activity.type}</Chip>
                  {activity.oas_stage && <Chip>OAS {activity.oas_stage}</Chip>}
                  {activity.duration_nights === 0 ? <Chip>Day activity</Chip>
                    : activity.duration_nights ? <Chip>{activity.duration_nights} night{activity.duration_nights > 1 ? 's' : ''}</Chip>
                    : null}
                </div>
                <h2 className="font-bold text-gray-800 text-sm leading-snug">{activity.title}</h2>
              </div>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-lg ml-1">✕</button>
            </div>

            <div className="p-5 space-y-4 text-sm">
              {/* Location */}
              <Section title="Location">
                <p className="text-gray-700">{activity.location?.name}</p>
                {activity.location?.park && <p className="text-gray-400 text-xs">{activity.location.park} • {activity.location.region}</p>}
                {activity.location?.distance_km && <p className="text-gray-400 text-xs">{activity.location.distance_km} km • {activity.location.terrain}</p>}
                {activity.location?.start_point && <p className="text-gray-400 text-xs">Start: {activity.location.start_point}</p>}
                {activity.location?.finish_point && <p className="text-gray-400 text-xs">Finish: {activity.location.finish_point}</p>}
              </Section>

              {/* Participants */}
              {activity.participants && (
                <Section title="Participants">
                  <p className="text-gray-700">
                    {activity.participants.youth_count ? `${activity.participants.youth_count} youth` : ''}
                    {activity.participants.leader_count ? ` • ${activity.participants.leader_count} leaders` : ''}
                    {activity.participants.min_oas_stage ? ` • Min OAS Stage ${activity.participants.min_oas_stage}` : ''}
                  </p>
                </Section>
              )}

              {/* Hazards */}
              {activity.hazards?.length > 0 && (
                <Section title={`Hazards (${activity.hazards.length})`}>
                  <div className="space-y-1.5">
                    {activity.hazards.map((h, i) => (
                      <div key={i} className="flex items-start gap-2">
                        <span className={`mt-0.5 px-1.5 py-0.5 rounded text-xs font-bold flex-shrink-0 ${riskColour(h.residual_risk)}`}>
                          {h.residual_risk || '?'}
                        </span>
                        <span className="text-gray-700 text-xs">{h.hazard}</span>
                      </div>
                    ))}
                  </div>
                </Section>
              )}

              {/* Equipment snippet */}
              {activity.equipment?.group && (
                <Section title="Group Equipment">
                  <p className="text-gray-600 text-xs">
                    {activity.equipment.group.join(' • ')}
                  </p>
                </Section>
              )}

              {/* Menu */}
              {activity.menu?.meals && (
                <Section title="Menu">
                  <p className="text-gray-600 text-xs">{activity.menu.meals}</p>
                  {activity.menu.water_plan && <p className="text-gray-500 text-xs mt-1">{activity.menu.water_plan}</p>}
                </Section>
              )}

              {/* Comms */}
              {activity.comms && (
                <Section title="Comms">
                  <p className="text-gray-600 text-xs">Primary: {activity.comms.primary}</p>
                  {activity.comms.emergency && <p className="text-gray-600 text-xs">Emergency: {activity.comms.emergency}</p>}
                </Section>
              )}

              {/* Special notes */}
              {activity.special_notes && (
                <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-xs text-yellow-800">
                  ⚠️ {activity.special_notes}
                </div>
              )}
            </div>

            {/* CTA */}
            <div className="sticky bottom-0 bg-white border-t border-gray-100 px-5 py-4">
              <button
                onClick={onUseTemplate}
                className="w-full gold-gradient text-black font-bold py-3 rounded-xl transition-all hover:shadow-md"
              >
                Use as Template →
              </button>
              <p className="text-center text-xs text-gray-400 mt-2">
                Pre-fills location, hazards, equipment, menu and comms
              </p>
            </div>
          </div>
        </div>
      );
    }

    /* Small modal section heading helper */
    function Section({ title, children }) {
      return (
        <div>
          <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">{title}</h3>
          {children}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 5 — PLAN DETAIL / DOCUMENT PREVIEW
    ══════════════════════════════════════════════════════════════ */
    function PlanDetail({ plan, onContinuePlanning }) {
      if (!plan) return null;
      const pct = plan.percentComplete || 0;

      return (
        <div className="max-w-4xl mx-auto px-4 py-6">
          {/* Header card */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-5">
            <div className="flex gap-3 items-start mb-4">
              <div className="text-4xl">{activityEmoji(plan.activityType)}</div>
              <div className="flex-1 min-w-0">
                <h1 className="text-xl font-bold text-gray-800 leading-tight">
                  {plan.title || 'Untitled Plan'}
                </h1>
                <p className="text-sm text-gray-400 mt-0.5 capitalize">
                  {plan.activityType} · Created {formatDate(plan.createdAt)}
                </p>
                {/* Progress */}
                <div className="flex items-center gap-2 mt-2">
                  <div className="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
                    <div
                      className="h-2 rounded-full pbar"
                      style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#2D6A2D' : '#F5A800' }}
                    />
                  </div>
                  <span className="text-sm font-bold" style={{ color: pct === 100 ? '#2D6A2D' : '#555' }}>
                    {pct}%
                  </span>
                </div>
                <p className="text-xs text-gray-400 mt-1">
                  {plan.completedSections.length} of {WIZARD_SECTIONS.length} sections complete
                  {pct === 100 && ' 🎉 Ready for review!'}
                </p>
              </div>
            </div>

            {/* Action buttons */}
            <div className="flex flex-wrap gap-2">
              <button
                onClick={onContinuePlanning}
                className="flex-1 min-w-28 font-bold py-2.5 px-4 rounded-xl text-white text-sm transition-all hover:opacity-90"
                style={{ backgroundColor: '#6B2D8B' }}
              >
                {pct === 100 ? '✏️ Edit Plan' : '→ Continue Planning'}
              </button>
              <button
                onClick={() => alert('📄 PDF download is coming soon!\n\nYour leader will be able to print the plan from Scout Hub once it\'s submitted for approval.')}
                className="flex-1 min-w-28 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-xl text-sm transition-colors"
              >
                📄 Download PDF
              </button>
              <a
                href="mailto:feedback@1stjerra.com.au?subject=Scout Planner Feedback"
                className="flex-1 min-w-28 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-xl text-sm transition-colors text-center"
              >
                ✉️ Send Feedback
              </a>
            </div>
          </div>

          {/* Section cards grid */}
          <h2 className="text-base font-bold text-gray-700 mb-3">Plan Sections</h2>
          <div className="grid gap-3 sm:grid-cols-2">
            {WIZARD_SECTIONS.map(section => {
              const done  = plan.completedSections.includes(section.id);
              const data  = plan.sections?.[section.id] || {};
              // Grab first two populated fields as preview lines
              const preview = Object.entries(data)
                .filter(([, v]) => v && String(v).trim())
                .slice(0, 2);

              return (
                <div
                  key={section.id}
                  className="bg-white rounded-2xl p-4 shadow-sm border transition-colors"
                  style={{ borderColor: done ? '#86efac' : '#e5e7eb' }}
                >
                  <div className="flex items-center gap-2 mb-2">
                    <span
                      className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"
                      style={{
                        backgroundColor: done ? '#2D6A2D' : '#e5e7eb',
                        color: done ? 'white' : '#6b7280'
                      }}
                    >
                      {done ? '✓' : section.number}
                    </span>
                    <span className={`font-bold text-sm ${done ? 'text-gray-800' : 'text-gray-400'}`}>
                      {section.label}
                    </span>
                  </div>

                  {preview.length > 0 ? (
                    <div className="space-y-1">
                      {preview.map(([k, v]) => (
                        <p key={k} className="text-xs text-gray-500 truncate">
                          <span className="text-gray-400 capitalize">
                            {k.replace(/([A-Z])/g, ' $1').toLowerCase()}:{' '}
                          </span>
                          {String(v).split('\n')[0].substring(0, 80)}
                          {String(v).length > 80 ? '…' : ''}
                        </p>
                      ))}
                    </div>
                  ) : (
                    <p className="text-xs text-gray-300 italic">Not completed yet</p>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       ROOT APP  — state + routing
    ══════════════════════════════════════════════════════════════ */
    function App() {
      const [screen,      setScreen]      = useState('dashboard');
      const [plans,       setPlans]       = useState(() => loadPlans());
      const [currentPlan, setCurrentPlan] = useState(null);

      // Keep localStorage in sync whenever plans change
      useEffect(() => { persistPlans(plans); }, [plans]);

      // Upsert a plan into the plans array and set it as current
      const upsertPlan = useCallback(updated => {
        setPlans(prev => {
          const idx = prev.findIndex(p => p.id === updated.id);
          const next = [...prev];
          if (idx >= 0) next[idx] = updated; else next.push(updated);
          return next;
        });
        setCurrentPlan(updated);
      }, []);

      // Screen 2 → select activity type → create plan → wizard
      function handleSelectType(type) {
        const plan = createNewPlan(type);
        setCurrentPlan(plan);
        setScreen('wizard');
      }

      // Library "Use as Template" → pre-fill new plan from library activity
      function handleUseTemplate(act) {
        const plan = createNewPlan(act.type);
        plan.title = act.title;

        // Pre-fill sections from the library activity's data
        plan.sections.activityInfo = {
          title:    act.title,
          oasStage: String(act.oas_stage || ''),
          duration: act.duration_nights === 0 ? 'Day activity (no overnight)'
                  : act.duration_nights    ? `${act.duration_nights} night${act.duration_nights > 1 ? 's' : ''}`
                  : '',
        };
        plan.sections.location = {
          locationName: act.location?.name      || '',
          region:       act.location?.region    || '',
          park:         act.location?.park      || '',
          startPoint:   act.location?.start_point  || '',
          finishPoint:  act.location?.finish_point || '',
          distanceKm:   String(act.location?.distance_km || ''),
          terrain:      act.location?.terrain   || '',
        };
        plan.sections.safety = {
          hazards:              (act.hazards || []).map(h => h.hazard).join('\n'),
          cancellationTriggers: (act.cancellation_triggers || []).join('\n'),
        };
        plan.sections.equipment = {
          groupEquipment:      (act.equipment?.group      || []).join('\n'),
          individualEquipment: (act.equipment?.individual || []).join('\n'),
        };
        plan.sections.menuWater = {
          meals:        act.menu?.meals      || '',
          waterPlan:    act.menu?.water_plan || '',
        };
        plan.sections.comms = {
          primaryComms:   act.comms?.primary   || '',
          alternateComms: act.comms?.alternate || '',
          emergencyComms: act.comms?.emergency || '',
        };
        plan.sections.emergencyPlan = {
          hospital:         act.hospital     || '',
          safeHavens:       (act.safe_havens || []).join('\n'),
          overdueTime:      act.overdue_time || '',
        };
        plan.sections.environment = {
          season:   act.weather?.season
            ? act.weather.season.charAt(0).toUpperCase() + act.weather.season.slice(1)
            : '',
          tempRange: act.weather?.temp_range || '',
        };
        if (act.participants) {
          plan.sections.participants = {
            youthCount:   String(act.participants.youth_count  || ''),
            leaderCount:  String(act.participants.leader_count || ''),
            minOasStage:  String(act.participants.min_oas_stage || ''),
          };
        }
        if (act.comms?.primary) {
          plan.sections.supervision = {
            supervisionType: act.supervision
              ? act.supervision.charAt(0).toUpperCase() + act.supervision.slice(1)
              : '',
          };
        }
        if (act.leadership) {
          plan.sections.leadership = {
            leaderInCharge: act.leadership.leader_in_charge || act.leadership.aa_leader || '',
            aaLeader:       act.leadership.aa_leader || '',
            firstAidOfficer: act.leadership.first_aid || '',
          };
        }

        plan.percentComplete = computePercent(plan);
        upsertPlan(plan);
        setScreen('wizard');
      }

      const navigate = dest => setScreen(dest);

      return (
        <div className="min-h-screen bg-gray-100">
          <Header screen={screen} onNavigate={navigate} currentPlan={currentPlan} />

          <main className="pb-12">
            {screen === 'dashboard' && (
              <Dashboard
                plans={plans}
                onNavigate={navigate}
                onSelectPlan={plan => { setCurrentPlan(plan); navigate('planDetail'); }}
              />
            )}

            {screen === 'newPlan' && (
              <NewPlan onSelectType={handleSelectType} />
            )}

            {screen === 'wizard' && currentPlan && (
              <Wizard
                plan={currentPlan}
                onUpdatePlan={upsertPlan}
                onNavigate={navigate}
              />
            )}

            {screen === 'library' && (
              <Library onUseTemplate={handleUseTemplate} />
            )}

            {screen === 'planDetail' && currentPlan && (
              <PlanDetail
                plan={currentPlan}
                onContinuePlanning={() => navigate('wizard')}
              />
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
